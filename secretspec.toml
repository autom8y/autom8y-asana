# Secret inventory for autom8y-asana.
# Documents the complete env var surface across all Pydantic Settings subsections.
# Documentation-only: no runtime behavior.
#
# Validate: secretspec check --config secretspec.toml --provider env

[project]
name = "autom8y-asana"
revision = "1.0"

# ---------------------------------------------------------------------------
# Ecosystem identity (Autom8yBaseSettings / SDK)
# ---------------------------------------------------------------------------
[profiles.default]
AUTOM8Y_ENV = { description = "Active deployment environment (local|staging|production|test). Canonical ecosystem var.", required = false, default = "local" }

# ---------------------------------------------------------------------------
# AsanaSettings (env_prefix = ASANA_)
# ---------------------------------------------------------------------------
ASANA_PAT = { description = "Asana Personal Access Token for API authentication", required = false, secret = true }
ASANA_WORKSPACE_GID = { description = "Default Asana workspace GID for operations", required = false }
ASANA_BASE_URL = { description = "Asana API base URL", required = false, default = "https://app.asana.com/api/1.0" }
ASANA_STRICT_CONFIG = { description = "Enable strict validation mode — raises on invalid ASANA_PROJECT_* vars instead of logging warning", required = false, default = "false" }

# ---------------------------------------------------------------------------
# CacheSettings (env_prefix = ASANA_CACHE_)
# ---------------------------------------------------------------------------
ASANA_CACHE_ENABLED = { description = "Master cache enable/disable switch", required = false, default = "true" }
ASANA_CACHE_PROVIDER = { description = "Explicit cache provider selection (memory|redis|tiered|none). None = auto-detect", required = false }
ASANA_CACHE_TTL_DEFAULT = { description = "Default cache TTL in seconds", required = false, default = "300" }
ASANA_CACHE_MEMORY_MAX_SIZE = { description = "Maximum entries in in-memory cache tier", required = false, default = "10000" }
ASANA_CACHE_DATAFRAME_HEAP_PERCENT = { description = "Max fraction of container memory for DataFrame cache (0.0-1.0)", required = false, default = "0.3" }
ASANA_CACHE_DATAFRAME_MAX_ENTRIES = { description = "Max DataFrame entries in memory tier", required = false, default = "100" }

# Entity-specific TTLs
ASANA_CACHE_TTL_USER = { description = "Cache TTL for user metadata in seconds", required = false, default = "3600" }
ASANA_CACHE_TTL_CUSTOM_FIELD = { description = "Cache TTL for custom field metadata in seconds", required = false, default = "1800" }
ASANA_CACHE_TTL_SECTION = { description = "Cache TTL for section data in seconds", required = false, default = "1800" }
ASANA_CACHE_TTL_PROJECT = { description = "Cache TTL for project data in seconds", required = false, default = "900" }
ASANA_CACHE_TTL_DETECTION = { description = "Cache TTL for entity detection results in seconds", required = false, default = "300" }
ASANA_CACHE_TTL_DYNAMIC_INDEX = { description = "Cache TTL for dynamic resolution indexes in seconds", required = false, default = "3600" }

# Cache operational constants
ASANA_CACHE_MODIFICATION_CHECK_TTL = { description = "TTL for in-memory batch modification check cache in seconds", required = false, default = "25.0" }
ASANA_CACHE_COALESCE_WINDOW_MS = { description = "Freshness coordinator coalescing window in milliseconds", required = false, default = "50" }
ASANA_CACHE_MAX_BATCH_SIZE = { description = "Maximum entries per batch freshness check", required = false, default = "100" }
ASANA_CACHE_DYNAMIC_INDEX_MAX_PER_ENTITY = { description = "Maximum dynamic indexes per entity type (LRU eviction)", required = false, default = "5" }
ASANA_CACHE_REDIS_MAX_CONNECTIONS = { description = "Maximum connections in Redis adapter connection pool", required = false, default = "20" }

# DataFrame cache circuit breaker
ASANA_CACHE_DF_COALESCER_MAX_WAIT = { description = "Maximum seconds waiters will wait for DataFrame coalescer", required = false, default = "60.0" }
ASANA_CACHE_DF_CB_FAILURE_THRESHOLD = { description = "DataFrame cache circuit breaker failure threshold", required = false, default = "3" }
ASANA_CACHE_DF_CB_RESET_TIMEOUT = { description = "DataFrame cache circuit breaker reset timeout in seconds", required = false, default = "60" }
ASANA_CACHE_DF_CB_SUCCESS_THRESHOLD = { description = "DataFrame cache circuit breaker success threshold to close", required = false, default = "1" }

# ---------------------------------------------------------------------------
# S3Settings (env_prefix = ASANA_CACHE_S3_)
# ---------------------------------------------------------------------------
ASANA_CACHE_S3_BUCKET = { description = "S3 bucket name for cache storage", required = false }
ASANA_CACHE_S3_PREFIX = { description = "S3 key prefix for cached objects", required = false, default = "asana-cache" }
ASANA_CACHE_S3_REGION = { description = "AWS region for S3 bucket", required = false, default = "us-east-1" }
ASANA_CACHE_S3_ENDPOINT_URL = { description = "Custom S3 endpoint URL for LocalStack or S3-compatible storage", required = false }

# ---------------------------------------------------------------------------
# RedisSettings (env_prefix = REDIS_)
# Shared REDIS_ prefix — not ASANA_-scoped, follows standard Redis conventions.
# ---------------------------------------------------------------------------
REDIS_HOST = { description = "Redis server hostname (required when using redis or tiered cache provider)", required = false }
REDIS_PORT = { description = "Redis server port", required = false, default = "6379" }
REDIS_PASSWORD = { description = "Redis authentication password", required = false, secret = true }
REDIS_SSL = { description = "Enable SSL/TLS for Redis connection", required = false, default = "true" }
REDIS_SOCKET_TIMEOUT = { description = "Redis socket timeout in seconds", required = false, default = "2.0" }
REDIS_CONNECT_TIMEOUT = { description = "Redis connection timeout in seconds", required = false, default = "5.0" }

# ---------------------------------------------------------------------------
# PacingSettings (env_prefix = ASANA_PACING_)
# ---------------------------------------------------------------------------
ASANA_PACING_PAGES_PER_PAUSE = { description = "Pages to fetch before pausing for rate-limit compliance", required = false, default = "25" }
ASANA_PACING_DELAY_SECONDS = { description = "Seconds to sleep between page batches", required = false, default = "2.0" }
ASANA_PACING_CHECKPOINT_EVERY_N_PAGES = { description = "Pages between S3 checkpoint writes", required = false, default = "50" }
ASANA_PACING_HIERARCHY_THRESHOLD = { description = "Parent GID count above which batched pacing activates", required = false, default = "100" }
ASANA_PACING_HIERARCHY_BATCH_SIZE = { description = "Parent GIDs to fetch per batch when pacing is active", required = false, default = "50" }
ASANA_PACING_HIERARCHY_BATCH_DELAY = { description = "Seconds to sleep between hierarchy parent fetch batches", required = false, default = "1.0" }

# ---------------------------------------------------------------------------
# RateLimitSettings (env_prefix = ASANA_RATELIMIT_)
# ---------------------------------------------------------------------------
ASANA_RATELIMIT_MAX_REQUESTS = { description = "Maximum Asana API requests per rate limit window", required = false, default = "1500" }
ASANA_RATELIMIT_WINDOW_SECONDS = { description = "Rate limit window duration in seconds", required = false, default = "60" }

# ---------------------------------------------------------------------------
# S3RetrySettings (env_prefix = ASANA_S3_)
# Controls S3 retry budget and circuit breaker for DataFrame persistence.
# ---------------------------------------------------------------------------
ASANA_S3_RETRY_MAX_ATTEMPTS = { description = "Maximum retry attempts for S3 operations", required = false, default = "3" }
ASANA_S3_RETRY_BASE_DELAY = { description = "Base delay for S3 exponential backoff in seconds", required = false, default = "0.5" }
ASANA_S3_RETRY_MAX_DELAY = { description = "Maximum delay cap for S3 retries in seconds", required = false, default = "10.0" }
ASANA_S3_BUDGET_PER_SUBSYSTEM_MAX = { description = "Per-subsystem retry budget", required = false, default = "20" }
ASANA_S3_BUDGET_GLOBAL_MAX = { description = "Global retry budget across all subsystems", required = false, default = "50" }
ASANA_S3_BUDGET_WINDOW_SECONDS = { description = "Retry budget window in seconds", required = false, default = "60.0" }
ASANA_S3_CB_FAILURE_THRESHOLD = { description = "Consecutive S3 failures before opening circuit", required = false, default = "5" }
ASANA_S3_CB_RECOVERY_TIMEOUT = { description = "Seconds to wait before S3 circuit breaker half-open probe", required = false, default = "60.0" }
ASANA_S3_CB_HALF_OPEN_MAX_PROBES = { description = "Successful probes required to close S3 circuit breaker", required = false, default = "2" }

# ---------------------------------------------------------------------------
# DataServiceSettings (env_prefix = AUTOM8Y_DATA_)
# Cross-service URL to autom8y-data.
# ---------------------------------------------------------------------------
AUTOM8Y_DATA_URL = { description = "Base URL for autom8y-data service API. Canonical Tier 3.", required = false, default = "http://localhost:8000" }
AUTOM8Y_DATA_CACHE_TTL = { description = "Client-side cache TTL in seconds for data service insights responses", required = false, default = "300" }
AUTOM8Y_DATA_INSIGHTS_ENABLED = { description = "Emergency kill switch for autom8y-data insights integration. Set false to disable without deployment", required = false, default = "true" }

# ---------------------------------------------------------------------------
# ObservabilitySettings (env_prefix = ASANA_CW_)
# ---------------------------------------------------------------------------
ASANA_CW_NAMESPACE = { description = "CloudWatch metric namespace for Lambda handlers", required = false, default = "autom8/lambda" }
ASANA_CW_ENVIRONMENT = { description = "Deployment environment label for CloudWatch metric dimensions", required = false, default = "staging" }

# ---------------------------------------------------------------------------
# RuntimeSettings (env_prefix = ASANA_RUNTIME_)
# ---------------------------------------------------------------------------
ASANA_RUNTIME_DATAFRAME_CACHE_BYPASS = { description = "Bypass DataFrame cache lookup (for testing or debugging)", required = false, default = "false" }
ASANA_RUNTIME_CONTAINER_MEMORY_MB = { description = "Explicit container memory limit override in MB. None = auto-detect from cgroup", required = false }
ASANA_RUNTIME_SECTION_FRESHNESS_PROBE = { description = "Enable section freshness probing (set to '0' to disable)", required = false, default = "1" }
ASANA_RUNTIME_SECTION_CASCADE_VALIDATION = { description = "Enable post-build cascade validation (set to '0' to disable)", required = false, default = "1" }
API_HOST = { description = "Bind host for ECS uvicorn server", required = false, default = "0.0.0.0" }
API_PORT = { description = "Bind port for ECS uvicorn server", required = false, default = "8000" }

# ---------------------------------------------------------------------------
# WebhookSettings (env_prefix = WEBHOOK_)
# ---------------------------------------------------------------------------
WEBHOOK_INBOUND_TOKEN = { description = "Shared secret for inbound webhook URL token verification. Empty = endpoint returns 503", required = false, secret = true }

# ---------------------------------------------------------------------------
# ProjectOverrideSettings — dynamic ASANA_PROJECT_* pattern
# These are validated at startup but use dynamic key names.
# ---------------------------------------------------------------------------
# ASANA_PROJECT_<NAME> = { description = "GID override for a named project (10+ digit numeric string). Validated at startup; invalid values log warning or raise in strict mode", required = false }
