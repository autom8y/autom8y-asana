- id: ob-universal-strategy-span-xdist
  filed_at: 2026-06-01
  filed_by: sre flaky-test root-fix sprint (fix-flaky-universal-strategy-xdist-2026-06-01)
  parent_initiative: ci-reliability-xdist-flake
  scope: >
    root-fix the xdist-concurrency flake in the test_universal_strategy_spans.py
    error-path tests (test_index_build_failure_sets_error_attributes,
    test_lookup_failure_adds_event_and_partial_success): the resolve_group span is
    intermittently NOT recorded in the InMemorySpanExporter under -n auto on the CI
    runner (assert 0 == 1). They are worker_isolated-quarantined (single-process)
    as targeted containment while the root mechanism is pinned.
  status: RESOLVED-collapsed-onto-sdk-primitive
  resolved_at: 2026-06-01
  resolved_by: sre M2 root-fix (sre-m2-otel-context-leak-span-sampling-fix-2026-06-01)
  collapsed_at: 2026-06-02
  collapsed_by: 10x-dev W1 telemetry-0.7.0-xdist-collapse (feat/telemetry-0.7.0-xdist-collapse)
  collapsed_onto: >
    autom8y-telemetry 0.7.0 restore_module(name) primitive
    (autom8y_telemetry.testing.restore_module / isolation.py). The bespoke
    finally-block in test_import_safety.py that snapshotted sys.modules[_MODULE]
    and the parent package attribute, then restored both, IS NOW the SDK
    primitive: the primitive's module docstring names asana #83 as its origin
    case, and W1 collapses the origin case back onto the generalization. The SDK
    version is strictly safer -- it snapshots the parent attribute's PRIOR value
    via a private sentinel (Case A/B/C totalized) rather than assuming
    parent.attr == original. The advisory autom8y_events hide+restore in
    test_workflow_handler.py was also collapsed (restore_module Case C,
    top-level module, no parent-attr rebind). Floor bumped to
    autom8y-telemetry[aws,fastapi,otlp]>=0.7.0 (pyproject.toml line 28).
  resolution: >
    Root cause PINNED via instrumented -n auto reproduction + a deterministic
    2-file serial repro. It was NOT an OTel sampling/context issue and NOT the
    fixture's set_tracer_provider. The polluter is tests/unit/lambda_handlers/
    test_import_safety.py: it does sys.modules.pop("autom8_asana.services.
    universal_strategy") + importlib.import_module(...) to assert import-safety,
    but never restored the canonical module object. The re-import replaced TWO
    references -- sys.modules[_MODULE] AND the parent package attribute
    autom8_asana.services.universal_strategy. Other test files bind
    UniversalResolutionStrategy at COLLECTION time to the original object; under
    xdist, whenever test_import_safety co-tenants a worker before a span/log
    test, that test's fixture (`import ... as _strategy_module`, which resolves
    via the PARENT ATTRIBUTE, not sys.modules) rebinds _tracer/patches logger on
    the throwaway re-import object while resolve() (collection-time class) reads
    the original -> spans/logs never reach the test's exporter/mock -> empty ->
    assert 0 == 1 (span tests) and call_count==0 (TestNullSlotLogging).
    Fix: test_import_safety restores BOTH sys.modules[_MODULE] and the parent
    package attribute in a finally block. Verified: deterministic 2-file repro
    goes 5-failed -> 7-passed; full -n auto x10 back-out gate green (was ~80%/run
    failing pre-fix). worker_isolated marks removed (4 tests re-enter the sharded
    gate: test_index_build_failure, test_lookup_failure, test_parent_child_relationship,
    and test_null_slot_increments_count_and_adds_event — the 4th was quarantined
    during the B7 async-migration session [PR #80] and shares this exact root cause
    per the call_count==0 failure mode above); test.yml isolated-job carve-out for
    this file removed. The worker_isolated CI job itself is PRESERVED for the
    separately-rooted test_workflow_handler.py quarantine (asyncio.run-in-handler
    SIGKILL, NOT this sys.modules flake).
  blocker: >
    not reproducible locally (5 strategies exhausted: 2-file x20, broad-unit x10,
    integration-inclusive x12, pytest-split 4-group, forced-order -- all green on 12
    cores). otel_provider fixture rebinds the module _tracer (looks isolated), so the
    span-not-recorded cause needs CI-resource-pressure reproduction. Containment
    (single-process) verified stable.
  watch_trigger: 2026-09-01
  deadline: 2026-12-01
  escalation_target: /sre observability-engineer (or /eunomia test-cartographer)
  retry_action: >
    reproduce in CI by looping these tests under -n auto with shard co-tenants +
    instrumentation capturing tracer-provider identity and exporter span-count on
    failure; pin the mechanism (likely SimpleSpanProcessor / global-provider under
    concurrency), make otel_provider fully concurrency-robust, then remove the marks.
  back_out_criterion: >
    root fix lands AND the tests pass 50x under -n auto in CI -> remove the
    @pytest.mark.worker_isolated marks (they re-enter the sharded gate).
  evidence_anchors:
    - tests/unit/services/test_universal_strategy_spans.py (worker_isolated marks)
    - .github/workflows/test.yml (isolated job, -m worker_isolated)
    - CI runs PR#72 shard 2/4 + PR#75 shard 1/4 (assert 0 == 1)

