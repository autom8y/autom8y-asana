# spectral-fleet.yaml
# Fleet OpenAPI governance rules for autom8y services.
#
# Usage:
#   spectral lint openapi.json --ruleset path/to/spectral-fleet.yaml
#
# These rules validate that service OpenAPI specs conform to fleet
# conventions: security metadata, phone field patterns, and response
# envelope structure.

extends: ["spectral:oas"]

rules:

  # R-01: Every operation (except health/ready) must declare security.
  #
  # Why: Fleet policy requires all business endpoints to be authenticated.
  # The SecureRouter mixin handles injection; this rule catches services
  # that forgot to adopt it.
  fleet-operation-security:
    description: >-
      Operations must declare a security property. Health and readiness
      endpoints (/health, /ready, /health/deps) are exempt.
    message: "Operation {{path}} is missing a 'security' property."
    severity: error
    given: "$.paths[?(!@property.match(/^\\/health|^\\/ready/))][get,post,put,patch,delete]"
    then:
      field: security
      function: truthy

  # R-02: All referenced security schemes must be defined.
  #
  # Why: Referencing a scheme name (e.g., BearerAuth) that does not
  # exist in components.securitySchemes is an invalid spec.
  # Note: This is partially covered by standard OAS validation, but
  # we promote it to error severity for fleet enforcement.
  fleet-security-schemes-defined:
    description: >-
      The spec must define at least one security scheme in
      components.securitySchemes when operations reference security.
    message: "No security schemes defined in components.securitySchemes."
    severity: error
    given: "$.components"
    then:
      field: securitySchemes
      function: truthy

  # R-03: Schema properties with "phone" in the name must have a pattern.
  #
  # Why: Phone fields without pattern constraints allow malformed data
  # through the API boundary. The E164PhoneField type alias auto-emits
  # the pattern; this rule catches raw str fields named *phone*.
  fleet-e164-phone-pattern:
    description: >-
      Schema properties containing 'phone' in the name must specify
      a 'pattern' for E.164 validation.
    message: "Property '{{property}}' looks like a phone field but has no pattern constraint."
    severity: warn
    given: "$.components.schemas..properties[?(@property.match(/phone/i))]"
    then:
      field: pattern
      function: truthy

  # R-04: Response schemas should follow the SuccessResponse envelope.
  #
  # Why: Fleet standard mandates {data, meta} envelope for all 2xx
  # responses. This rule checks that 200/201 response schemas contain
  # both 'data' and 'meta' top-level properties.
  #
  # Severity is warn (not error) because this is a migration-period rule.
  # Services adopting SuccessResponse[T] will pass automatically.
  fleet-envelope-consistency:
    description: >-
      Success response schemas (200, 201) should follow the fleet
      SuccessResponse pattern with 'data' and 'meta' top-level properties.
    message: "Response schema at {{path}} does not follow the {data, meta} envelope pattern."
    severity: warn
    given: "$.paths..responses[200,201].content.application/json.schema"
    then:
      - field: properties.data
        function: truthy
      - field: properties.meta
        function: truthy
