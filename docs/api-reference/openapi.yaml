      description: "Pagination metadata for list responses.\n\nPer ADR-ASANA-008:\
        \ Cursor-based pagination with opaque offset.\n\nAttributes:\n    limit: Number\
        \ of items requested per page.\n    has_more: Whether more items exist after\
        \ this page.\n    next_offset: Opaque cursor for next page (None if no more\
        \ pages)."
    ReorderSectionRequest:
      properties:
        project_gid:
