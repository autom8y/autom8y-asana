      - gid
      title: AsanaResource
      description: "Base Asana resource returned by the Asana API.\n\nAll Asana resources\
        \ share a gid and resource_type. Additional fields\nvary by endpoint and the\
        \ opt_fields parameter. The extra=\"allow\"\nconfig accepts any additional\
        \ fields without declaring them, which\navoids the circular $ref problem that\
        \ dict[str, Any] causes in the\ngenerated OpenAPI schema.\n\nAttributes:\n\
        \    gid: Globally unique identifier for the Asana resource.\n    resource_type:\
        \ Resource type string (e.g., \"task\", \"project\").\n    name: Display name\
        \ of the resource (optional, depends on opt_fields)."
    CreateProjectRequest:
      properties:
        name:
          type: string
          minLength: 1
          title: Name
          description: Project name
