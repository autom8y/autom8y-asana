  /v1/resolve/{entity_type}:
    post:
      tags:
      - resolver
      summary: Resolve Entities
      description: "Resolve entity identifiers to task GIDs.\n\nThis endpoint resolves\
        \ business identifiers (phone/vertical, offer_id, etc.)\nto Asana task GIDs\
        \ using entity-type-specific resolution strategies.\n\nAuthentication:\n \
        \   Requires valid service token (S2S JWT).\n    PAT tokens are NOT supported.\n\
        \nPath Parameters:\n    entity_type: Entity type to resolve (unit, business,\
        \ offer, contact)\n\nRequest:\n    POST /v1/resolve/unit\n    {\n        \"\
        criteria\": [\n            {\"phone\": \"+15551234567\", \"vertical\": \"\
        dental\"},\n            {\"phone\": \"+15559876543\", \"vertical\": \"medical\"\
        }\n        ]\n    }\n\nResponse:\n    {\n        \"results\": [\n        \
        \    {\"gid\": \"1234567890123456\"},\n            {\"gid\": null, \"error\"\
        : \"NOT_FOUND\"}\n        ],\n        \"meta\": {\n            \"resolved_count\"\
        : 1,\n            \"unresolved_count\": 1,\n            \"entity_type\": \"\
        unit\",\n            \"project_gid\": \"1201081073731555\"\n        }\n  \
        \  }\n\nError Responses:\n    - 401 MISSING_AUTH: No Authorization header\n\
        \    - 401 SERVICE_TOKEN_REQUIRED: PAT token provided (S2S only)\n    - 404\
        \ UNKNOWN_ENTITY_TYPE: entity_type not in allowed values\n    - 422 VALIDATION_ERROR:\
        \ Invalid request body\n    - 503 DISCOVERY_INCOMPLETE: Startup discovery\
        \ not finished\n\nArgs:\n    entity_type: Path parameter for entity type\n\
        \    request_body: ResolutionRequest with criteria\n    request: FastAPI request\
        \ object\n    claims: Validated service claims from JWT\n\nReturns:\n    ResolutionResponse\
        \ with results and metadata."
      operationId: resolve_entities_v1_resolve__entity_type__post
      parameters:
      - name: entity_type
        in: path
        required: true
        schema:
          type: string
          title: Entity Type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolutionRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolutionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/query/{entity_type}:
    post:
      tags:
      - query
      summary: Query Entities
      description: Query entities from DataFrame cache (deprecated -- use /rows).
      operationId: query_entities_v1_query__entity_type__post
      parameters:
      - name: entity_type
        in: path
        required: true
        schema:
          type: string
          title: Entity Type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/query/{entity_type}/rows:
    post:
      tags:
      - query-v2
      summary: Query Rows
      description: 'Query entity rows with composable predicate filtering.


        See PRD-dynamic-query-service FR-004.'
      operationId: query_rows_v1_query__entity_type__rows_post
      parameters:
      - name: entity_type
        in: path
        required: true
        schema:
          type: string
          title: Entity Type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RowsRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RowsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/query/{entity_type}/aggregate:
    post:
      tags:
      - query-v2
      summary: Query Aggregate
      description: 'Aggregate entity data with grouping and optional HAVING filter.


        See PRD-dynamic-query-service FR-005.'
      operationId: query_aggregate_v1_query__entity_type__aggregate_post
      parameters:
      - name: entity_type
        in: path
        required: true
        schema:
          type: string
          title: Entity Type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AggregateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AggregateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/admin/cache/refresh:
    post:
      tags:
      - admin
      summary: Refresh Cache
      description: "Trigger cache refresh for one or all entity types.\n\nRequires\
        \ S2S JWT authentication. Kicks off a background task and\nreturns 202 Accepted\
        \ immediately.\n\nArgs:\n    request: FastAPI request object.\n    body: Cache\
        \ refresh request parameters.\n    background_tasks: FastAPI background tasks.\n\
        \    claims: Validated service claims from S2S JWT.\n\nReturns:\n    CacheRefreshResponse\
        \ with refresh details.\n\nRaises:\n    HTTPException: 400 for invalid entity\
        \ type, 503 for cache not ready."
      operationId: refresh_cache_v1_admin_cache_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CacheRefreshRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CacheRefreshResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/webhooks/inbound:
    post:
      tags:
      - webhooks
      summary: Receive Inbound Webhook
      description: "Receive Asana Rules action POST with full task JSON.\n\nPer PRD-GAP-02\
        \ / FR-01, FR-04, FR-05:\n1. Verify URL token (via Depends)\n2. Parse request\
        \ body as Task\n3. Enqueue background processing\n4. Return 200 immediately\n\
        \nArgs:\n    request: FastAPI request for raw body access.\n    background_tasks:\
        \ FastAPI BackgroundTasks for async processing.\n    _token: Verified token\
        \ (unused, presence confirms auth).\n\nReturns:\n    200 with {\"status\"\
        : \"accepted\"} for valid payloads.\n    400 for unparseable or invalid payloads.\n\
        \    401 for auth failures (handled by Depends).\n    503 if webhook not configured\
        \ (handled by Depends)."
      operationId: receive_inbound_webhook_api_v1_webhooks_inbound_post
      parameters:
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/entity/{entity_type}/{gid}:
    patch:
      tags:
      - entity-write
      summary: Write Entity Fields
      description: "Write fields to an Asana entity.\n\nAuthentication: S2S JWT only\
        \ (require_service_claims dependency).\n\nPath Parameters:\n    entity_type:\
        \ Entity type (offer, unit, business, etc.)\n    gid: Asana task GID\n\nQuery\
        \ Parameters:\n    include_updated: If true, re-fetch and return current field\
        \ values.\n\nRequest Body:\n    EntityWriteRequest with fields dict and optional\
        \ list_mode.\n\nReturns:\n    EntityWriteResponse with per-field results."
      operationId: write_entity_fields_api_v1_entity__entity_type___gid__patch
      parameters:
      - name: entity_type
        in: path
        required: true
        schema:
          type: string
          title: Entity Type
      - name: gid
        in: path
        required: true
        schema:
          type: string
          title: Gid
      - name: include_updated
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Updated
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityWriteRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityWriteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AddTagRequest:
      properties:
        tag_gid:
          type: string
          minLength: 1
          title: Tag Gid
          description: Tag GID to add
      additionalProperties: false
      type: object
      required:
      - tag_gid
      title: AddTagRequest
      description: "Request body for adding a tag to a task.\n\nPer FR-API-TASK-012:\
        \ Add tag to task endpoint.\n\nAttributes:\n    tag_gid: GID of the tag to\
        \ add."
    AddTaskToSectionRequest:
      properties:
        task_gid:
          type: string
          minLength: 1
          title: Task Gid
          description: Task GID to add
      additionalProperties: false
      type: object
      required:
      - task_gid
      title: AddTaskToSectionRequest
      description: "Request body for adding a task to a section.\n\nPer FR-API-SECT-005:\
        \ Add task to section endpoint.\n\nAttributes:\n    task_gid: GID of the task\
        \ to add."
    AddToProjectRequest:
      properties:
        project_gid:
          type: string
          minLength: 1
          title: Project Gid
          description: Project GID to add to
      additionalProperties: false
      type: object
      required:
      - project_gid
      title: AddToProjectRequest
      description: "Request body for adding task to a project.\n\nPer FR-API-TASK-016:\
        \ Add task to project endpoint.\n\nAttributes:\n    project_gid: GID of the\
        \ project to add task to."
    AggFunction:
      type: string
      enum:
      - sum
      - count
      - mean
      - min
      - max
      - count_distinct
      title: AggFunction
      description: Supported aggregation functions for /aggregate endpoint.
    AggSpec:
      properties:
        column:
          type: string
          title: Column
        agg:
          $ref: '#/components/schemas/AggFunction'
        alias:
          anyOf:
          - type: string
          - type: 'null'
          title: Alias
      additionalProperties: false
      type: object
      required:
      - column
      - agg
      title: AggSpec
      description: "Single aggregation specification within an /aggregate request.\n\
        \nAttributes:\n    column: Column to aggregate (must exist in SchemaRegistry).\n\
        \    agg: Aggregation function to apply.\n    alias: Output column name. Defaults\
        \ to \"{agg}_{column}\"."
    AggregateMeta:
      properties:
        group_count:
          type: integer
          title: Group Count
        aggregation_count:
          type: integer
          title: Aggregation Count
        group_by:
          items:
            type: string
          type: array
          title: Group By
        entity_type:
          type: string
          title: Entity Type
        project_gid:
          type: string
          title: Project Gid
        query_ms:
          type: number
          title: Query Ms
        freshness:
          anyOf:
          - type: string
          - type: 'null'
          title: Freshness
        data_age_seconds:
          anyOf:
          - type: number
          - type: 'null'
          title: Data Age Seconds
        staleness_ratio:
          anyOf:
          - type: number
          - type: 'null'
          title: Staleness Ratio
      additionalProperties: false
      type: object
      required:
      - group_count
      - aggregation_count
      - group_by
      - entity_type
      - project_gid
      - query_ms
      title: AggregateMeta
      description: Response metadata for /aggregate endpoint.
    AggregateRequest:
      properties:
        where:
          anyOf:
          - oneOf:
            - $ref: '#/components/schemas/Comparison'
            - $ref: '#/components/schemas/AndGroup'
            - $ref: '#/components/schemas/OrGroup'
            - $ref: '#/components/schemas/NotGroup'
          - type: 'null'
          title: Where
        section:
          anyOf:
          - type: string
          - type: 'null'
          title: Section
        group_by:
          items:
            type: string
          type: array
          maxItems: 5
          minItems: 1
          title: Group By
        aggregations:
          items:
            $ref: '#/components/schemas/AggSpec'
          type: array
          maxItems: 10
          minItems: 1
          title: Aggregations
        having:
          anyOf:
          - oneOf:
            - $ref: '#/components/schemas/Comparison'
            - $ref: '#/components/schemas/AndGroup'
            - $ref: '#/components/schemas/OrGroup'
            - $ref: '#/components/schemas/NotGroup'
          - type: 'null'
          title: Having
      additionalProperties: false
      type: object
      required:
      - group_by
      - aggregations
      title: AggregateRequest
      description: POST /v1/query/{entity_type}/aggregate request body.
    AggregateResponse:
      properties:
        data:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Data
        meta:
          $ref: '#/components/schemas/AggregateMeta'
      additionalProperties: false
      type: object
      required:
      - data
      - meta
      title: AggregateResponse
      description: Response body for /aggregate endpoint.
    AndGroup:
      properties:
        and:
          items:
            oneOf:
            - $ref: '#/components/schemas/Comparison'
            - $ref: '#/components/schemas/AndGroup'
            - $ref: '#/components/schemas/OrGroup'
            - $ref: '#/components/schemas/NotGroup'
          type: array
          title: And
      additionalProperties: false
      type: object
      required:
      - and
      title: AndGroup
      description: 'AND group node: all children must match.'
    CacheRefreshRequest:
      properties:
        entity_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Entity Type
        force_full_rebuild:
          type: boolean
          title: Force Full Rebuild
          default: false
      type: object
      title: CacheRefreshRequest
      description: "Request body for cache refresh endpoint.\n\nAttributes:\n    entity_type:\
        \ Specific entity type to refresh. If None, refresh all.\n    force_full_rebuild:\
        \ If True, delete manifests and rebuild from scratch."
    CacheRefreshResponse:
      properties:
        status:
          type: string
          title: Status
          default: accepted
        message:
          type: string
          title: Message
        entity_types:
          items:
            type: string
          type: array
          title: Entity Types
        refresh_id:
          type: string
          title: Refresh Id
        force_full_rebuild:
          type: boolean
          title: Force Full Rebuild
      type: object
      required:
      - message
      - entity_types
      - refresh_id
      - force_full_rebuild
      title: CacheRefreshResponse
      description: "Response body for cache refresh endpoint.\n\nAttributes:\n   \
        \ status: Always \"accepted\" for 202 responses.\n    message: Human-readable\
        \ description of the action taken.\n    entity_types: List of entity types\
        \ being refreshed.\n    refresh_id: Unique identifier for this refresh operation.\n\
        \    force_full_rebuild: Whether full rebuild was requested."
    Comparison:
      properties:
        field:
          type: string
          title: Field
        op:
          $ref: '#/components/schemas/Op'
        value:
          title: Value
      additionalProperties: false
      type: object
      required:
      - field
      - op
      - value
      title: Comparison
      description: 'Leaf predicate node: single field comparison.'
    CreateProjectRequest:
      properties:
        name:
          type: string
          minLength: 1
          title: Name
          description: Project name
        workspace:
          type: string
          minLength: 1
          title: Workspace
          description: Workspace GID
        team:
          anyOf:
          - type: string
          - type: 'null'
          title: Team
          description: Team GID (for organizations)
      additionalProperties: false
      type: object
      required:
      - name
      - workspace
      title: CreateProjectRequest
      description: "Request body for creating a project.\n\nPer FR-API-PROJ-002: Create\
        \ project endpoint.\n\nAttributes:\n    name: Project name (required).\n \
        \   workspace: Workspace GID (required).\n    team: Team GID (optional, for\
        \ organization workspaces)."
    CreateSectionRequest:
      properties:
        name:
          type: string
          minLength: 1
          title: Name
          description: Section name
        project:
          type: string
          minLength: 1
          title: Project
          description: Project GID
      additionalProperties: false
      type: object
      required:
      - name
      - project
      title: CreateSectionRequest
      description: "Request body for creating a section.\n\nPer FR-API-SECT-002: Create\
        \ section endpoint.\n\nAttributes:\n    name: Section name (required).\n \
        \   project: Project GID to create section in (required)."
    CreateTaskRequest:
      properties:
        name:
          type: string
          minLength: 1
          title: Name
          description: Task name
        notes:
          anyOf:
          - type: string
          - type: 'null'
          title: Notes
          description: Task description
        assignee:
          anyOf:
          - type: string
          - type: 'null'
          title: Assignee
          description: Assignee user GID
        projects:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Projects
          description: Project GIDs to add task to
        due_on:
          anyOf:
          - type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          - type: 'null'
          title: Due On
          description: Due date (YYYY-MM-DD)
        workspace:
          anyOf:
          - type: string
          - type: 'null'
          title: Workspace
          description: Workspace GID (required if no projects)
      additionalProperties: false
      type: object
      required:
      - name
      title: CreateTaskRequest
      description: "Request body for creating a task.\n\nPer FR-API-TASK-003: Create\
        \ task endpoint.\n\nAttributes:\n    name: Task name (required).\n    notes:\
        \ Task description (optional).\n    assignee: Assignee user GID (optional).\n\
        \    projects: List of project GIDs to add task to (optional).\n    due_on:\
        \ Due date in YYYY-MM-DD format (optional).\n    workspace: Workspace GID\
        \ (required if no projects specified)."
    DuplicateTaskRequest:
      properties:
        name:
          type: string
          minLength: 1
          title: Name
          description: Name for duplicated task
      additionalProperties: false
      type: object
      required:
      - name
      title: DuplicateTaskRequest
      description: "Request body for duplicating a task.\n\nPer FR-API-TASK-011: Duplicate\
        \ task endpoint.\n\nAttributes:\n    name: Name for the new duplicated task."
    EntitySchemaResponse:
      properties:
        entity_type:
          type: string
          title: Entity Type
        version:
          type: string
          title: Version
        queryable_fields:
          items:
            $ref: '#/components/schemas/SchemaFieldInfo'
          type: array
          title: Queryable Fields
      additionalProperties: false
      type: object
      required:
      - entity_type
      - version
      - queryable_fields
      title: EntitySchemaResponse
      description: 'Response for schema discovery endpoint.


        Returns metadata about queryable fields for an entity type.'
    EntityWriteRequest:
      properties:
        fields:
          additionalProperties: true
          type: object
          title: Fields
        list_mode:
          type: string
          enum:
          - replace
          - append
          title: List Mode
          default: replace
      type: object
      required:
      - fields
      title: EntityWriteRequest
      description: "Request body for PATCH /api/v1/entity/{entity_type}/{gid}.\n\n\
        Attributes:\n    fields: Dict mapping field names to values. Accepts both\n\
        \        Python descriptor names (weekly_ad_spend) and Asana\n        display\
        \ names (\"Weekly Ad Spend\"). Core fields (name,\n        assignee, due_on,\
        \ completed, notes) are also accepted.\n    list_mode: How to handle list-type\
        \ fields.\n        \"replace\" (default): Replace entire field value.\n  \
        \      \"append\": Append to existing values (multi_enum, text lists)."
    EntityWriteResponse:
      properties:
        gid:
          type: string
          title: Gid
        entity_type:
          type: string
          title: Entity Type
        fields_written:
          type: integer
          title: Fields Written
        fields_skipped:
          type: integer
          title: Fields Skipped
        field_results:
          items:
            $ref: '#/components/schemas/FieldWriteResult'
          type: array
          title: Field Results
        updated_fields:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Updated Fields
      type: object
      required:
      - gid
      - entity_type
      - fields_written
      - fields_skipped
      - field_results
      title: EntityWriteResponse
      description: Response for entity write endpoint.
    FieldWriteResult:
      properties:
        name:
          type: string
          title: Name
        status:
          type: string
          enum:
          - written
          - skipped
          - error
          title: Status
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
        suggestions:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Suggestions
      type: object
      required:
      - name
      - status
      title: FieldWriteResult
      description: Per-field write result.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    JoinSpec:
      properties:
        entity_type:
          type: string
          title: Entity Type
        select:
          items:
            type: string
          type: array
          maxItems: 10
          minItems: 1
          title: Select
        'on':
          anyOf:
          - type: string
          - type: 'null'
          title: 'On'
      additionalProperties: false
      type: object
      required:
      - entity_type
      - select
      title: JoinSpec
      description: "Specification for a cross-entity join on /rows.\n\nExample:\n\
        \    {\n        \"entity_type\": \"business\",\n        \"select\": [\"booking_type\"\
        , \"stripe_id\"],\n        \"on\": \"office_phone\"\n    }"
    MembersRequest:
      properties:
        members:
          items:
            type: string
          type: array
          minItems: 1
          title: Members
          description: List of user GIDs
      additionalProperties: false
      type: object
      required:
      - members
      title: MembersRequest
      description: "Request body for adding/removing project members.\n\nPer FR-API-PROJ-007/008:\
        \ Add/remove members endpoints.\n\nAttributes:\n    members: List of user\
        \ GIDs to add or remove."
    MoveSectionRequest:
      properties:
        section_gid:
          type: string
          minLength: 1
          title: Section Gid
          description: Target section GID
        project_gid:
          type: string
          minLength: 1
          title: Project Gid
          description: Project GID containing section
      additionalProperties: false
      type: object
      required:
      - section_gid
      - project_gid
      title: MoveSectionRequest
      description: "Request body for moving a task to a section.\n\nPer FR-API-TASK-014:\
        \ Move task to section endpoint.\n\nAttributes:\n    section_gid: GID of the\
        \ target section.\n    project_gid: GID of the project containing the section."
    NotGroup:
      properties:
        not:
          oneOf:
          - $ref: '#/components/schemas/Comparison'
          - $ref: '#/components/schemas/AndGroup'
          - $ref: '#/components/schemas/OrGroup'
          - $ref: '#/components/schemas/NotGroup'
          title: Not
      additionalProperties: false
      type: object
      required:
      - not
      title: NotGroup
      description: 'NOT group node: child must not match.'
    Op:
      type: string
      enum:
      - eq
      - ne
      - gt
      - lt
      - gte
      - lte
      - in
      - not_in
      - contains
      - starts_with
      title: Op
      description: Supported comparison operators.
    OrGroup:
      properties:
        or:
          items:
            oneOf:
            - $ref: '#/components/schemas/Comparison'
            - $ref: '#/components/schemas/AndGroup'
            - $ref: '#/components/schemas/OrGroup'
            - $ref: '#/components/schemas/NotGroup'
          type: array
          title: Or
      additionalProperties: false
      type: object
      required:
      - or
      title: OrGroup
      description: 'OR group node: at least one child must match.'
    PaginationMeta:
      properties:
        limit:
          type: integer
          minimum: 1.0
          title: Limit
          description: Number of items per page
        has_more:
          type: boolean
          title: Has More
          description: Whether more items exist
        next_offset:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Offset
          description: Opaque cursor for next page
      additionalProperties: false
      type: object
      required:
      - limit
      - has_more
      title: PaginationMeta
      description: "Pagination metadata for list responses.\n\nPer ADR-ASANA-008:\
        \ Cursor-based pagination with opaque offset.\n\nAttributes:\n    limit: Number\
        \ of items requested per page.\n    has_more: Whether more items exist after\
        \ this page.\n    next_offset: Opaque cursor for next page (None if no more\
        \ pages)."
    QueryMeta:
      properties:
        total_count:
          type: integer
          title: Total Count
        limit:
          type: integer
          title: Limit
        offset:
          type: integer
          title: Offset
        entity_type:
          type: string
          title: Entity Type
        project_gid:
          type: string
          title: Project Gid
      additionalProperties: false
      type: object
      required:
      - total_count
      - limit
      - offset
      - entity_type
      - project_gid
      title: QueryMeta
      description: Response metadata for pagination and context.
    QueryRequest:
      properties:
        where:
          additionalProperties: true
          type: object
          title: Where
          default: {}
        select:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Select
        limit:
          type: integer
          title: Limit
          default: 100
        offset:
          type: integer
          title: Offset
          default: 0
      additionalProperties: false
      type: object
      title: QueryRequest
