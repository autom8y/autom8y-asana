openapi: 3.1.0
info:
  title: autom8_asana API
  description: REST API for Asana integration via autom8_asana SDK
  version: 0.1.0
paths:
  /health:
    get:
      tags:
      - health
      summary: Health Check
      description: "Liveness probe - returns 200 if the application is running.\n\n\
        Per FR-API-HEALTH-001:\n- Returns 200 with {\"status\": \"healthy\", \"version\"\
        : \"0.1.0\"}\n\nPer FR-API-HEALTH-002:\n- This endpoint does NOT require authentication\n\
        - No Authorization header needed\n\nThis endpoint is used by ALB/ECS health\
        \ checks to determine if the\napplication process is running and can accept\
        \ connections. It always\nreturns 200 to ensure containers are not killed\
        \ during cache warming.\n\nFor cache readiness checks, use GET /health/ready\
        \ instead.\n\nReturns:\n    JSON response with status and current version.\n\
        \    - 200: Application is running (always)"
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health/ready:
    get:
      tags:
      - health
      summary: Readiness Check
      description: "Readiness probe - returns 200 only when cache is warm.\n\nPer\
        \ sprint-materialization-002 FR-004:\n- Returns 503 with {\"status\": \"warming\"\
        } during cache preload\n- Returns 200 with {\"status\": \"ready\"} after cache\
        \ is ready\n\nUse this endpoint for traffic gating decisions that require\
        \ warm cache.\nThe ALB should use /health for liveness, not this endpoint.\n\
        \nReturns:\n    JSON response with status and current version.\n    - 200:\
        \ Cache is ready, service can handle traffic optimally\n    - 503: Cache is\
        \ warming, service may have degraded performance"
      operationId: readiness_check_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health/s2s:
    get:
      tags:
      - health
      summary: S2S Health Check
      description: "S2S readiness probe - checks JWT/S2S authentication dependencies.\n\
        \nPer PRD-S2S-001 NFR-OPS-002:\n- Returns S2S connectivity status\n- Checks\
        \ JWKS endpoint reachability\n- Checks bot PAT configuration\n\nThis endpoint\
        \ verifies that the service can accept S2S (JWT) requests:\n1. JWKS endpoint\
        \ is reachable for signature validation\n2. Bot PAT is configured for Asana\
        \ API calls\n\nDoes NOT require authentication.\n\nReturns:\n    JSON response\
        \ with S2S connectivity details.\n    - 200: All dependencies healthy\n  \
        \  - 503: One or more dependencies unavailable"
      operationId: s2s_health_check_health_s2s_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/users/me:
    get:
      tags:
      - users
      summary: Get current authenticated user
      description: "Get the current authenticated user.\n\nReturns the user associated\
        \ with the provided PAT token.\n\nReturns:\n    User data with gid, name,\
        \ email, and workspaces."
      operationId: get_current_user_api_v1_users_me_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_AsanaResource_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/{gid}:
    get:
      tags:
      - users
      summary: Get user by GID
      description: "Get a user by their GID.\n\nArgs:\n    gid: Asana user GID.\n\n\
        Returns:\n    User data with gid, name, email, and workspaces."
      operationId: get_user_api_v1_users__gid__get
      parameters:
      - name: gid
        in: path
        required: true
        schema:
          type: string
          title: Gid
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_AsanaResource_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users:
    get:
      tags:
      - users
      summary: List users in workspace
      description: "List users in a workspace with pagination.\n\nReturns a paginated\
        \ list of users in the specified workspace.\n\nArgs:\n    workspace: Workspace\
        \ GID (required).\n    limit: Number of items per page (1-100, default 100).\n\
        \    offset: Pagination cursor from previous response.\n\nReturns:\n    List\
        \ of users with pagination metadata."
      operationId: list_users_api_v1_users_get
      parameters:
      - name: workspace
        in: query
        required: true
        schema:
          type: string
          description: Workspace GID to list users from
          title: Workspace
        description: Workspace GID to list users from
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Number of items per page
          default: 100
          title: Limit
        description: Number of items per page
      - name: offset
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Pagination cursor from previous response
          title: Offset
        description: Pagination cursor from previous response
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_list_AsanaResource__'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/workspaces:
    get:
      tags:
      - workspaces
      summary: List all workspaces
      description: "List all workspaces accessible to the authenticated user.\n\n\
        Returns a paginated list of workspaces the user has access to.\n\nArgs:\n\
        \    limit: Number of items per page (1-100, default 100).\n    offset: Pagination\
        \ cursor from previous response.\n\nReturns:\n    List of workspaces with\
        \ pagination metadata."
      operationId: list_workspaces_api_v1_workspaces_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Number of items per page
          default: 100
          title: Limit
        description: Number of items per page
      - name: offset
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Pagination cursor from previous response
          title: Offset
        description: Pagination cursor from previous response
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_list_AsanaResource__'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/workspaces/{gid}:
    get:
      tags:
      - workspaces
      summary: Get workspace by GID
      description: "Get a workspace by its GID.\n\nArgs:\n    gid: Asana workspace\
        \ GID.\n\nReturns:\n    Workspace data with gid, name, is_organization, and\
        \ email_domains."
      operationId: get_workspace_api_v1_workspaces__gid__get
      parameters:
      - name: gid
        in: path
        required: true
        schema:
          type: string
          title: Gid
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_AsanaResource_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/dataframes/project/{gid}:
    get:
      tags:
      - dataframes
      summary: Get project tasks as dataframe
      description: "Get project tasks as a DataFrame.\n\nPer FR-API-DF-001, FR-API-DF-002,\
        \ TDD-dynamic-schema-api:\n- Fetches tasks from the specified project\n- Returns\
        \ DataFrame in JSON or Polars format based on Accept header\n- Supports all\
        \ registered schemas via dynamic validation\n\nArgs:\n    gid: Asana project\
        \ GID.\n    schema: Schema for extraction (base, unit, contact, business,\n\
        \        offer, asset_edit, asset_edit_holder). Case-insensitive.\n    limit:\
        \ Number of items per page (1-100, default 100).\n    offset: Pagination cursor\
        \ from previous response.\n    accept: Accept header for content negotiation.\n\
        \nReturns:\n    DataFrame data in requested format with pagination metadata.\n\
        \nRaises:\n    HTTPException: 400 if schema is invalid (includes valid_schemas\
        \ list)."
      operationId: get_project_dataframe_api_v1_dataframes_project__gid__get
      parameters:
      - name: gid
        in: path
        required: true
        schema:
          type: string
          title: Gid
      - name: schema
        in: query
        required: false
        schema:
          type: string
          description: 'Schema to use for extraction. Valid values: base, unit, contact,
            business, offer, asset_edit, asset_edit_holder'
          default: base
          title: Schema
        description: 'Schema to use for extraction. Valid values: base, unit, contact,
          business, offer, asset_edit, asset_edit_holder'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Number of items per page
          default: 100
          title: Limit
        description: Number of items per page
      - name: offset
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Pagination cursor from previous response
          title: Offset
        description: Pagination cursor from previous response
      - name: Accept
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Response format preference
          default: application/json
          title: Accept
        description: Response format preference
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: DataFrame data in requested format
          content:
            application/json:
              schema: {}
              example:
                data:
                - gid: '123'
                  name: Task 1
                  type: Unit
                - gid: '456'
                  name: Task 2
                  type: Contact
                meta:
                  request_id: abc123
                  timestamp: '2024-01-01T00:00:00Z'
                  pagination:
                    limit: 100
                    has_more: false
            application/x-polars-json:
              description: Polars-serialized JSON format
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/dataframes/section/{gid}:
    get:
      tags:
      - dataframes
      summary: Get section tasks as dataframe
      description: "Get section tasks as a DataFrame.\n\nPer FR-API-DF-003, FR-API-DF-004,\
        \ TDD-dynamic-schema-api:\n- Fetches tasks from the specified section\n- Returns\
        \ DataFrame in JSON or Polars format based on Accept header\n- Supports all\
        \ registered schemas via dynamic validation\n\nArgs:\n    gid: Asana section\
        \ GID.\n    schema: Schema for extraction (base, unit, contact, business,\n\
        \        offer, asset_edit, asset_edit_holder). Case-insensitive.\n    limit:\
        \ Number of items per page (1-100, default 100).\n    offset: Pagination cursor\
        \ from previous response.\n    accept: Accept header for content negotiation.\n\
        \nReturns:\n    DataFrame data in requested format with pagination metadata.\n\
        \nRaises:\n    HTTPException: 400 if schema is invalid (includes valid_schemas\
        \ list).\n    HTTPException: 404 if section not found or has no parent project."
      operationId: get_section_dataframe_api_v1_dataframes_section__gid__get
      parameters:
      - name: gid
        in: path
        required: true
        schema:
          type: string
          title: Gid
      - name: schema
        in: query
        required: false
        schema:
          type: string
          description: 'Schema to use for extraction. Valid values: base, unit, contact,
            business, offer, asset_edit, asset_edit_holder'
          default: base
          title: Schema
        description: 'Schema to use for extraction. Valid values: base, unit, contact,
          business, offer, asset_edit, asset_edit_holder'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Number of items per page
          default: 100
          title: Limit
        description: Number of items per page
      - name: offset
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Pagination cursor from previous response
          title: Offset
        description: Pagination cursor from previous response
      - name: Accept
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Response format preference
          default: application/json
          title: Accept
        description: Response format preference
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: DataFrame data in requested format
          content:
            application/json:
              schema: {}
              example:
                data:
                - gid: '123'
                  name: Task 1
                  type: Unit
                meta:
                  request_id: abc123
                  timestamp: '2024-01-01T00:00:00Z'
                  pagination:
                    limit: 100
                    has_more: false
            application/x-polars-json:
              description: Polars-serialized JSON format
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/tasks:
    get:
      tags:
      - tasks
      summary: List tasks by project or section
      description: "List tasks by project or section with pagination.\n\nArgs:\n \
        \   project: Project GID to list tasks from.\n    section: Section GID to\
        \ list tasks from.\n    limit: Number of items per page (1-100, default 100).\n\
        \    offset: Pagination cursor from previous response.\n\nReturns:\n    List\
        \ of tasks with pagination metadata.\n\nRaises:\n    400: Neither project\
        \ nor section provided, or both provided."
      operationId: list_tasks_api_v1_tasks_get
      parameters:
      - name: project
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Project GID to list tasks from
          title: Project
        description: Project GID to list tasks from
      - name: section
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Section GID to list tasks from
          title: Section
        description: Section GID to list tasks from
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Number of items per page
          default: 100
          title: Limit
        description: Number of items per page
      - name: offset
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Pagination cursor from previous response
          title: Offset
        description: Pagination cursor from previous response
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_list_AsanaResource__'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - tasks
      summary: Create a new task
      description: "Create a new task.\n\nArgs:\n    body: Task creation parameters.\n\
        \nReturns:\n    Created task data.\n\nRaises:\n    400: Neither projects nor\
        \ workspace provided."
      operationId: create_task_api_v1_tasks_post
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_AsanaResource_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/tasks/{gid}:
    get:
      tags:
      - tasks
      summary: Get task by GID
      description: "Get a task by its GID.\n\nArgs:\n    gid: Asana task GID.\n  \
        \  opt_fields: Comma-separated list of fields to include in response.\n\n\
        Returns:\n    Task data with requested fields."
      operationId: get_task_api_v1_tasks__gid__get
      parameters:
      - name: gid
        in: path
        required: true
        schema:
          type: string
          title: Gid
      - name: opt_fields
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Comma-separated list of fields to include
          examples:
          - name,notes,due_on,assignee
          title: Opt Fields
        description: Comma-separated list of fields to include
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_AsanaResource_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - tasks
      summary: Update a task
      description: "Update an existing task.\n\nOnly provided fields are updated;\
        \ omitted fields retain their values.\n\nArgs:\n    gid: Asana task GID.\n\
        \    body: Fields to update.\n\nReturns:\n    Updated task data."
      operationId: update_task_api_v1_tasks__gid__put
      parameters:
      - name: gid
        in: path
        required: true
        schema:
          type: string
          title: Gid
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_AsanaResource_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - tasks
      summary: Delete a task
      description: "Delete a task.\n\nArgs:\n    gid: Asana task GID.\n\nReturns:\n\
        \    No content on success."
      operationId: delete_task_api_v1_tasks__gid__delete
      parameters:
      - name: gid
        in: path
        required: true
        schema:
          type: string
          title: Gid
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/tasks/{gid}/subtasks:
    get:
      tags:
      - tasks
      summary: List subtasks of a task
      description: "List subtasks of a task with pagination.\n\nArgs:\n    gid: Parent\
        \ task GID.\n    limit: Number of items per page (1-100, default 100).\n \
        \   offset: Pagination cursor from previous response.\n\nReturns:\n    List\
        \ of subtasks with pagination metadata."
      operationId: list_subtasks_api_v1_tasks__gid__subtasks_get
      parameters:
      - name: gid
        in: path
        required: true
        schema:
          type: string
          title: Gid
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Number of items per page
          default: 100
          title: Limit
        description: Number of items per page
      - name: offset
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Pagination cursor from previous response
          title: Offset
        description: Pagination cursor from previous response
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_list_AsanaResource__'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/tasks/{gid}/dependents:
    get:
      tags:
      - tasks
      summary: List dependent tasks
      description: "List tasks that depend on this task with pagination.\n\nArgs:\n\
        \    gid: Task GID to get dependents for.\n    limit: Number of items per\
        \ page (1-100, default 100).\n    offset: Pagination cursor from previous\
        \ response.\n\nReturns:\n    List of dependent tasks with pagination metadata."
      operationId: list_dependents_api_v1_tasks__gid__dependents_get
      parameters:
      - name: gid
        in: path
        required: true
        schema:
          type: string
          title: Gid
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Number of items per page
          default: 100
          title: Limit
        description: Number of items per page
      - name: offset
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Pagination cursor from previous response
          title: Offset
        description: Pagination cursor from previous response
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_list_AsanaResource__'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/tasks/{gid}/duplicate:
    post:
      tags:
      - tasks
      summary: Duplicate a task
      description: "Duplicate a task.\n\nArgs:\n    gid: GID of task to duplicate.\n\
        \    body: Name for the duplicated task.\n\nReturns:\n    New duplicated task\
        \ data."
      operationId: duplicate_task_api_v1_tasks__gid__duplicate_post
      parameters:
      - name: gid
        in: path
        required: true
        schema:
          type: string
          title: Gid
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DuplicateTaskRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_AsanaResource_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/tasks/{gid}/tags:
    post:
