      - workspace
      title: CreateProjectRequest
      description: "Request body for creating a project.\n\nPer FR-API-PROJ-002: Create\
        \ project endpoint.\n\nAttributes:\n    name: Project name (required).\n \
        \   workspace: Workspace GID (required).\n    team: Team GID (optional, for\
        \ organization workspaces)."
    CreateSectionRequest:
