name = 'spike'
description = 'Time-boxed research and exploration (no production code)'
prompt = "---\nname: spike\ndescription: Time-boxed research and exploration (no production code)\nargument-hint: \"<question> [--timebox=DURATION]\"\nallowed-tools: Bash, Read, Write, Task, Glob, Grep, WebFetch, WebSearch\nmodel: opus\n---\n\n## Context\nAuto-injected by SessionStart hook (project, rite, session, git).\n\n## Pre-flight\n\n1. **Arguments required**:\n   - Parse `$ARGUMENTS` for spike topic\n   - If empty: ERROR \"Spike topic required. Usage: /spike 'exploration topic'\"\n\n## Repo-Identity Detection (ADR-pythia-shape-contract Appendix B — Option D baseline)\n\nBefore beginning research, detect the cwd-repo and check against the active session's repo:\n\n1. Execute `git rev-parse --show-toplevel` via Bash to get the current cwd's repo root (`artifact_repo`).\n2. Check `.sos/sessions/` for the most recent active session's `SESSION_CONTEXT.md`. If found and it contains a `session_repo` field, use that value as `session_repo`. If absent or field not present, treat `artifact_repo` as `session_repo`.\n3. If cwd-repo ≠ session-repo: emit WARN \"Repo-identity mismatch: session bound to {session_repo}, artifact authoring in {artifact_repo}. Artifact will be stamped with both; verify intentional.\"\n4. Carry both `session_repo` and `artifact_repo` (both as absolute paths) forward into the scaffold frontmatter in the ## Output phase.\n\n## Your Task\n\nConduct time-boxed research to answer a technical question. $ARGUMENTS\n\n**NO PRODUCTION CODE. Research and report only.**\n\n## Behavior\n\n1. **Define the question**:\n   - What are we trying to learn?\n   - What decision will this inform?\n   - What's the timebox?\n\n2. **Research**:\n   - Explore existing codebase\n   - Search documentation\n   - Evaluate alternatives\n   - Build throwaway POC if needed\n\n3. **Document findings**:\n   - Create spike report\n   - Comparison matrix (if evaluating options)\n   - Recommendation with rationale\n\n4. **Timebox checkpoints**:\n   - 25% mark: Initial findings\n   - 50% mark: Deep dive complete\n   - 75% mark: Draft recommendation\n   - 100% mark: Final report\n\n## Output\n\nAuthor the spike report at `.sos/wip/SPIKE-{slug}.md` via the\nprogressive-write-heredoc pattern. The pattern is codified in the\n`progressive-write-heredoc` skill (invoke `Skill('progressive-write-heredoc')`\nfor the full protocol).\n\nPhase 1: scaffold the file in one Bash heredoc with the spike report schema\n(frontmatter + section headings) and `<!-- pending: {section-id} -->`\nplaceholders per schema (see `spike:templates` skill for the canonical schema).\nThe YAML frontmatter must include `session_repo` and `artifact_repo` fields\n(both absolute paths detected during Repo-Identity Detection above):\n- session_repo: {session_repo absolute path}\n- artifact_repo: {artifact_repo absolute path}\n\nPhase 2: interpolate sections progressively (Mode A re-heredoc recommended for\ntypical spike sizes).\n\nVerify before reporting: `grep -c '<!-- pending:' .sos/wip/SPIKE-{slug}.md`\nmust equal 0. Return the absolute output path to the user.\n\n## Example\n\n```\n/spike \"Can we use GraphQL instead of REST?\" --timebox=4h\n/spike \"What's the best approach for real-time updates?\"\n```\n\n## Reference\n\nFull documentation: `.gemini/commands/spike.md`\n\n## Sigil\n\n### On Success\n\nEnd your response with:\n\n🔭 explored · next: {hint}\n\n**Fork-context note**: This command may run without conversation history. To resolve the hint, read session state from disk:\n- Find active session: look for `status: \"ACTIVE\"` in `.sos/sessions/*/SESSION_CONTEXT.md`\n- No active session found → output `🔭 explored` without hint.\n\nNatural follow-on: `next: /consult` (to plan next steps based on findings) or `next: /sos start` (if the spike informed a new initiative).\n\n### On Failure\n\n❌ spike failed: {brief reason} · fix: {recovery}\n\nInfer recovery: no topic provided → provide a topic string; uncertain → `/consult`.\nUser arguments: {{args}}"
