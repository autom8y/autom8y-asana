name = 'instrumentation'
description = 'Quick switch to instrumentation (domain observability workflow)'
prompt = "---\nname: instrumentation\ndescription: Quick switch to instrumentation (domain observability workflow)\nargument-hint: \"[--overwrite-diverged] [--dry-run] [--keep-orphans]\"\nallowed-tools: Bash, Read\nmodel: haiku\ndisable-model-invocation: true\ncontext: fork\n---\n\n## Context\nAuto-injected by SessionStart hook (project, rite, session, git).\n\n## Your Task\n\nSwitch to the instrumentation rite and display the pantheon. $ARGUMENTS\n\n## Behavior\n\n1. Execute: `ari sync --rite instrumentation $ARGUMENTS`\n2. Display the pantheon output from ari (agents and their roles)\n3. Confirm `ari sync` output shows the correct active rite\n\nAfter the switch, display this condensed overview:\n\n```\nINSTRUMENTATION - Domain Observability Rite\n=============================================\n\nBrings convention-driven domain instrumentation to autom8y services.\nAuto-instrumentation tells you WHAT happened; this rite adds WHY and WHAT IT MEANS.\n\nPHASES (5):\n  AUDIT      convention-auditor       Scan service against convention spec\n  PLAN       instrumentation-planner  Design file-level change plan\n  INSTRUMENT span-engineer            Write production instrumentation code\n  VALIDATE   narrative-validator      Verify spans tell the business story\n  RATIFY     potnia                   Review, accept, evolve conventions\n\nCOMPLEXITY:\n  PATCH   Single route/function (skips RATIFY)\n  MODULE  Full service instrumentation\n  SYSTEM  Fleet-wide audit + prioritized queue\n\nREWORK LOOPS:\n  VALIDATE fail(implementation) --> INSTRUMENT  (code bugs)\n  VALIDATE fail(plan_design)    --> PLAN        (wrong mechanism)\n  VALIDATE fail(gap_coverage)   --> AUDIT       (missed gaps)\n\nKEY ARTIFACTS:\n  Convention spec: INSTRUMENTING.md\n  SDK surface:     sdks/python/autom8y-telemetry/\n  Gap reports:     .ledge/reviews/GAP-{service}.md\n```\n\n## Flags\n\n| Flag | Description |\n|------|-------------|\n| `--overwrite-diverged` | Force regeneration of diverged files |\n| `--dry-run` | Preview changes without applying |\n| `--keep-orphans` | Preserve orphaned knossos files (default: auto-remove) |\n\n## When to Use\n\n- Adding domain-specific OTel spans to a service\n- Auditing services for convention compliance\n- Fleet-wide instrumentation gap analysis\n- Evolving the convention spec after new domain patterns emerge\n\n## Workflow\n\n```\naudit -> plan -> instrument -> validate -> ratify\n```\n\n## Reference\n\nConvention spec: `INSTRUMENTING.md`\nSDK: `sdks/python/autom8y-telemetry/`\nOTel literature: `.know/literature-otel-instrumentation-conventions.md`\nNarrative literature: `.know/literature-narrative-observability.md`\nUser arguments: {{args}}"
