name: CON-2 Freeze Smoke

# Proves node build/inline.mjs executes in-container after the CON-2 bundle.
# Uses a focused image (Dockerfile.smoke) — no CodeArtifact auth required.
# Both freeze legs must pass: valid addr (frozen file + addr frozen in HTML)
# and broken addr (ADDR-NON-CANONICAL, exit nonzero, no file).
# Authority: G-THEATER gate (grandeur anchor 2026-06-27)

on:
  push:
    branches: [chore/asana-bundle-node-producer, main]
    paths:
      - Dockerfile.smoke
      - vendor/deck-producer/**
      - scripts/smoke-freeze.sh
      - .github/workflows/con2-freeze-smoke.yml
  pull_request:
    branches: [main]
    paths:
      - Dockerfile.smoke
      - vendor/deck-producer/**
      - scripts/smoke-freeze.sh
      - .github/workflows/con2-freeze-smoke.yml

permissions:
  contents: read

jobs:
  freeze-smoke:
    name: in-container freeze smoke (both legs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
      - name: Build focused smoke image (no CodeArtifact needed)
        run: docker build -f Dockerfile.smoke -t con2-smoke:ci .
      - name: Run freeze smoke — both legs
        run: bash scripts/smoke-freeze.sh con2-smoke:ci
