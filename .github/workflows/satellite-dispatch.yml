name: Satellite Dispatch

on:
  repository_dispatch:
    types: [sdk-published]
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions: {}

# Serialize asana satellite deploys: stacked dispatches (sdk-published +
# main-branch Test-success + manual workflow_dispatch can fire near-simultaneously)
# previously raced the downstream a8 deploy, re-registering competing task
# definitions. cancel-in-progress: false queues a new dispatch behind any
# in-flight one rather than cancelling a mid-canary deploy. Asana-scoped — this
# workflow only ever dispatches the asana service.
concurrency:
  group: asana-satellite-deploy
  cancel-in-progress: false

jobs:
  dispatch:
    timeout-minutes: 5
    if: >-
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0 (node24)
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: autom8y

      - name: Determine trigger type
        id: trigger
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "triggered_by=sdk-published" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "triggered_by=workflow_dispatch" >> $GITHUB_OUTPUT
          else
            echo "triggered_by=push" >> $GITHUB_OUTPUT
          fi

      - name: Dispatch to autom8y
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: autom8y/autom8y
          event-type: satellite-deploy
          client-payload: |
            {
              "service_name": "asana",
              "satellite_repo": "autom8y-asana",
              "ref": "${{ github.event.workflow_run.head_branch || github.ref_name }}",
              "sha": "${{ github.event.workflow_run.head_sha || github.sha }}",
              "triggered_by": "${{ steps.trigger.outputs.triggered_by }}"
            }

      - name: Log dispatch success
        run: |
          echo "Successfully dispatched satellite-deploy event to autom8y/autom8y"
          echo "  Service: asana"
          echo "  Repository: autom8y-asana"
          echo "  Ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}"
          echo "  SHA: ${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "  Triggered by: ${{ steps.trigger.outputs.triggered_by }}"
