name: Post-Merge Coverage

# Closes GLINT-003 coverage-gate-theater per Sprint-2 SRE-004 acceptance
# criteria. Per-shard coverage on PRs is meaningless (test_splits=4 means
# each shard covers ~25% of src/autom8_asana). This workflow runs the full
# pytest suite single-shard on push to main, enforcing the
# pyproject.toml:127 fail_under = 80 floor that the sharded PR job at
# .github/workflows/test.yml:52 explicitly disables (coverage_threshold: 0).
#
# Single-shard is intentional — accepts the wallclock cost because this is
# post-merge async and aggregate coverage cannot be meaningfully computed
# across distributed pytest-split groups.
#
# Acceptance criteria source: HANDOFF-eunomia-to-sre-2026-04-29.md SRE-004
# Decision rationale: ADR-011-post-merge-coverage-job-2026-04-30.md

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allow manual trigger for verification + ad-hoc reruns

concurrency:
  group: post-merge-coverage-${{ github.ref }}
  cancel-in-progress: false  # let post-merge gates run to completion

jobs:
  coverage:
    name: Aggregate Coverage Gate (full suite, single-shard)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Get CodeArtifact token
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain autom8y \
            --query authorizationToken \
            --output text)
          echo "CODEARTIFACT_AUTH_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Install dependencies
        # Mirror aegis-synthetic-coverage.yml:56-60 install pattern: uv sync
        # with --no-sources to ignore [tool.uv.sources] monorepo-relative
        # path overrides, --all-extras to pick up dev/api/auth/events groups
        # so the full test suite resolves.
        run: uv sync --no-sources --all-extras
        env:
          UV_INDEX_AUTOM8Y_USERNAME: aws
          UV_INDEX_AUTOM8Y_PASSWORD: ${{ env.CODEARTIFACT_AUTH_TOKEN }}

      - name: Run pytest with aggregate coverage enforcement
        # CRITICAL: full suite, single-shard, NO pytest-split.
        # --cov-fail-under=80 enforces pyproject.toml:127 floor.
        # Marker exclusions mirror .github/workflows/test.yml:56 push-event
        # set ('not integration and not benchmark and not fuzz') so the
        # coverage measurement surface is consistent with the sharded PR
        # job — this is the same test population that produces the (theatrical)
        # PR-altitude coverage signal, just measured under a single
        # pytest invocation where aggregate fail_under is meaningful.
        run: |
          uv run --no-sources pytest \
            --cov=src/autom8_asana \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -m "not integration and not benchmark and not fuzz" \
            tests/
        env:
          AUTOM8Y_ENV: test
          ASANA_WORKSPACE_GID: ${{ vars.ASANA_WORKSPACE_GID }}

      - name: Upload coverage artifact
        if: always()  # capture even on threshold failure for diagnosis
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report-${{ github.sha }}
          path: |
            coverage.xml
            .coverage
          if-no-files-found: warn
          retention-days: 30
