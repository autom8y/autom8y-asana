name: Durations Refresh

# Weekly refresh of the committed .test_durations file used by pytest-split
# for 4-shard CI matrix balance.
#
# The refresh job runs the full fast-path suite once with --store-durations,
# commits the updated file to a new branch, and opens an auto-PR labeled
# 'ci-maintenance' for review.
# CIMS Phase 2 Sprint 2 CHANGE-002 (I-2-asana durations refresh cadence).

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 09:00 UTC (safely before Monday PR traffic)
  workflow_dispatch:

concurrency:
  group: durations-refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    name: Refresh .test_durations
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 (node24)
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0 (node24)
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Get CodeArtifact token
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain autom8y \
            --query authorizationToken \
            --output text)
          echo "CODEARTIFACT_AUTH_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Configure uv for CodeArtifact
        run: echo "UV_INDEX_AUTOM8Y_PASSWORD=$CODEARTIFACT_AUTH_TOKEN" >> "$GITHUB_ENV"
        env:
          CODEARTIFACT_AUTH_TOKEN: ${{ env.CODEARTIFACT_AUTH_TOKEN }}

      - name: Install dependencies
        run: uv sync --no-sources --all-extras --group dev
        env:
          UV_INDEX_AUTOM8Y_USERNAME: aws

      - name: Run fast-path suite and store durations
        run: |
          uv run --no-sources pytest tests/ \
            -m 'not integration and not benchmark and not slow and not fuzz' \
            --store-durations --durations-path=.test_durations \
            -v --tb=short
        env:
          UV_INDEX_AUTOM8Y_USERNAME: aws
          AUTOM8Y_ENV: test
          ASANA_WORKSPACE_GID: ${{ vars.ASANA_WORKSPACE_GID }}

      - name: Check for durations changes
        id: diff
        run: |
          if git diff --quiet .test_durations; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open refresh PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1 (node24)
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/durations-refresh-${{ github.run_id }}
          base: main
          commit-message: "chore(ci): refresh .test_durations"
          title: "chore(ci): refresh .test_durations"
          labels: ci-maintenance
          body: |
            Automated weekly refresh of `.test_durations` for pytest-split
            4-shard CI matrix balance.

            If the diff is non-empty, the test-duration distribution has shifted
            (new tests or runtime changes). Review and merge to improve shard balance.

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          add-paths: |
            .test_durations
