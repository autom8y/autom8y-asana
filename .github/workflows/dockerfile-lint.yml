name: Dockerfile Lint (hadolint + M-16)

# Authority: ADR-013-sre-005-hadolint-2026-04-30.md
# Audit substrate: .sos/wip/sre/AUDIT-sre-005-dockerfile-2026-04-30.md §7.1
# Charter: PYTHIA-INAUGURAL-CONSULT-2026-04-30-sprint3 §5.3 (B2)

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - '.hadolint.yaml'
      - '.github/workflows/dockerfile-lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - '.hadolint.yaml'
      - '.github/workflows/dockerfile-lint.yml'

permissions:
  contents: read

jobs:
  hadolint:
    name: hadolint (${{ matrix.dockerfile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile: [Dockerfile, Dockerfile.dev]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          config: .hadolint.yaml
          failure-threshold: warning

  m16-pattern-assert:
    name: M-16 watch-trigger pattern assertion (P-1/P-2/P-3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Assert P-1 (Stage-0 secrets-extension exists)
        run: grep -qE '^FROM .* AS secrets-extension$' Dockerfile
      - name: Assert P-2 (Stage-2 COPY --link --from=secrets-extension)
        run: grep -qE 'COPY --link --from=secrets-extension' Dockerfile
      - name: Assert P-3 (all cross-stage COPY use --link)
        # Negation check: any bare 'COPY ' without flag prefix is a violation
        # in production Dockerfile (Dockerfile.dev intentionally exempt — single stage)
        run: |
          if grep -nE '^COPY [^-]' Dockerfile; then
            echo "ERROR: bare COPY (no --link/--from) detected in Dockerfile (P-3 violation)" >&2
            exit 1
          fi
