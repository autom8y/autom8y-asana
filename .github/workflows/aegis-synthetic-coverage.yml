name: Aegis Synthetic Coverage

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/synthetic/**'
      - 'docs/api-reference/**'
      - 'scripts/aegis-check.py'
      - '.github/workflows/aegis-synthetic-coverage.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/synthetic/**'
      - 'docs/api-reference/**'
      - 'scripts/aegis-check.py'
      - '.github/workflows/aegis-synthetic-coverage.yml'

concurrency:
  group: aegis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aegis:
    name: Aegis Memory & Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 (node24)
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0 (node24)
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Get CodeArtifact token
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain autom8y \
            --query authorizationToken \
            --output text)
          echo "CODEARTIFACT_AUTH_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: uv sync --no-sources --all-extras
        env:
          UV_INDEX_AUTOM8Y_USERNAME: aws
          UV_INDEX_AUTOM8Y_PASSWORD: ${{ env.CODEARTIFACT_AUTH_TOKEN }}

      - name: Run Aegis synthetic coverage tests
        run: uv run --no-sources pytest tests/synthetic/ -q -s --tb=short
        env:
          AUTOM8Y_ENV: test
          IDEMPOTENCY_STORE_BACKEND: noop

      - name: Upload aegis report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0 (node24)
        with:
          name: aegis-report
          path: aegis-report.json
          if-no-files-found: warn

      - name: Validate aegis report exists
        if: always()
        run: |
          if [ ! -f aegis-report.json ]; then
            echo "::error::aegis-report.json was not generated -- pytest likely crashed before fixture teardown"
            exit 1
          fi
          if [ ! -s aegis-report.json ]; then
            echo "::error::aegis-report.json is empty -- fixture teardown did not complete"
            exit 1
          fi
          echo "aegis-report.json found ($(wc -c < aegis-report.json | tr -d ' ') bytes)"

      - name: Aegis threshold enforcement
        if: always()
        run: uv run --no-sources python scripts/aegis-check.py aegis-report.json
