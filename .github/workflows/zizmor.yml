name: zizmor (Actions Security)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'

permissions:
  contents: read
  security-events: write

jobs:
  zizmor:
    uses: autom8y/autom8y-workflows/.github/workflows/security-zizmor.yml@f5601acbe3905270dfcb9069854c78c0f940ad05
