name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  # Prevent AsanaClient._auto_detect_workspace() from creating a SyncHttpClient
  # in async test contexts. Tests mock the Asana API; this GID is never used.
  ASANA_WORKSPACE_GID: "1234567890123456"

jobs:
  lint-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::696318035277:role/github-actions-deploy
          aws-region: us-east-1
      - name: Get CodeArtifact auth token
        id: codeartifact
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain autom8y \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
      - name: Configure uv for CodeArtifact
        run: |
          echo "UV_INDEX_AUTOM8Y_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_AUTOM8Y_PASSWORD=${{ steps.codeartifact.outputs.token }}" >> $GITHUB_ENV
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Check formatting
        run: uv run ruff format . --check
      - name: Run linting
        run: uv run ruff check .
      - name: Run type checking
        run: uv run mypy src/autom8_asana --strict

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::696318035277:role/github-actions-deploy
          aws-region: us-east-1
      - name: Get CodeArtifact auth token
        id: codeartifact
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain autom8y \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
      - name: Configure uv for CodeArtifact
        run: |
          echo "UV_INDEX_AUTOM8Y_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_AUTOM8Y_PASSWORD=${{ steps.codeartifact.outputs.token }}" >> $GITHUB_ENV
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run unit tests with coverage
        run: uv run pytest tests/ -n auto -m "not slow and not integration and not benchmark" -v --cov=autom8_asana --cov-report=xml --cov-fail-under=80
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  full-regression:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::696318035277:role/github-actions-deploy
          aws-region: us-east-1
      - name: Get CodeArtifact auth token
        id: codeartifact
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain autom8y \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
      - name: Configure uv for CodeArtifact
        run: |
          echo "UV_INDEX_AUTOM8Y_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_AUTOM8Y_PASSWORD=${{ steps.codeartifact.outputs.token }}" >> $GITHUB_ENV
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run all tests with coverage
        run: uv run pytest tests/ -n auto -m "not integration" -v --cov=autom8_asana --cov-report=xml --cov-fail-under=80
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::696318035277:role/github-actions-deploy
          aws-region: us-east-1
      - name: Get CodeArtifact auth token
        id: codeartifact
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain autom8y \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
      - name: Configure uv for CodeArtifact
        run: |
          echo "UV_INDEX_AUTOM8Y_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_AUTOM8Y_PASSWORD=${{ steps.codeartifact.outputs.token }}" >> $GITHUB_ENV
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --timeout=300 --cov=autom8_asana --cov-report=xml
        continue-on-error: true
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: integration
          fail_ci_if_error: false
