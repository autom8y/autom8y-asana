name: Test
run-name: "Test [${{ github.event.inputs.dispatch_correlation_id || github.sha }}]"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # sdk-contract-governance Sprint 3: accept dispatch from
  # autom8y/sdk-publish-v2.yml's consumer-gate job. See sibling satellites
  # for the rollout-window pin rationale.
  workflow_dispatch:
    inputs:
      candidate_sdk_name:
        description: 'Candidate SDK distribution name (consumer-gate)'
        type: string
        required: false
        default: ''
      candidate_sdk_version:
        description: 'Candidate SDK version (consumer-gate)'
        type: string
        required: false
        default: ''
      candidate_wheel_run_id:
        description: 'Run ID of the workflow that uploaded the candidate wheel artifact'
        type: string
        required: false
        default: ''
      dispatch_correlation_id:
        description: 'Correlation UUID echoed into the run name (consumer-gate)'
        type: string
        required: false
        default: ''

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    permissions:
      id-token: write
      contents: read
    # Pinned to SHA 614a4e5 (consumer-gate support). Update when autom8y-workflows changes.
    uses: autom8y/autom8y-workflows/.github/workflows/satellite-ci-reusable.yml@614a4e5f1ea9d366b7daa5a5521744f2f5bd22ae
    with:
      mypy_targets: 'src/autom8_asana'
      coverage_package: 'autom8_asana'
      coverage_threshold: 80
      test_parallel: true
      test_markers_exclude: 'not integration and not benchmark'
      run_integration: ${{ github.event_name == 'push' }}
      test_env: 'ASANA_WORKSPACE_GID=${{ vars.ASANA_WORKSPACE_GID }}'
      spectral_enabled: true
      openapi_spec_path: 'docs/api-reference/openapi.json'
      spec_check_enabled: true
      spec_check_validate_script: 'scripts/validate_openapi.py'
      spec_check_extras: '--all-extras'
      spec_check_env: |-
        AUTOM8Y_ENV=local
        AUTH_DEV_MODE=true
      semantic_score_enabled: true
      candidate_sdk_name: ${{ inputs.candidate_sdk_name }}
      candidate_sdk_version: ${{ inputs.candidate_sdk_version }}
      candidate_wheel_run_id: ${{ inputs.candidate_wheel_run_id }}
      dispatch_correlation_id: ${{ inputs.dispatch_correlation_id }}
    secrets: inherit

  fleet-schema-governance:
    name: Fleet Schema Governance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: autom8y-api-schemas

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: autom8y/autom8y-api-schemas
          path: _autom8y-api-schemas
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Fleet schema governance (V1-subclass check)
        run: |
          set +e
          python _autom8y-api-schemas/src/autom8y_api_schemas/governance/check_response_meta.py \
            --json ./src/ > /tmp/governance.json
          exit_code=$?
          set -e
          echo "## Fleet Schema Governance" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat /tmp/governance.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ $exit_code -ne 0 ]; then
            echo "::error::V1-subclassing hazard detected. See governance output."
            exit 1
          fi
