name: Test
run-name: "Test [${{ github.event.inputs.dispatch_correlation_id || github.sha }}]"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # sdk-contract-governance Sprint 3: accept dispatch from
  # autom8y/sdk-publish-v2.yml's consumer-gate job. See sibling satellites
  # for the rollout-window pin rationale.
  workflow_dispatch:
    inputs:
      candidate_sdk_name:
        description: 'Candidate SDK distribution name (consumer-gate)'
        type: string
        required: false
        default: ''
      candidate_sdk_version:
        description: 'Candidate SDK version (consumer-gate)'
        type: string
        required: false
        default: ''
      candidate_wheel_run_id:
        description: 'Run ID of the workflow that uploaded the candidate wheel artifact'
        type: string
        required: false
        default: ''
      dispatch_correlation_id:
        description: 'Correlation UUID echoed into the run name (consumer-gate)'
        type: string
        required: false
        default: ''

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    permissions:
      id-token: write
      contents: read
    # Pinned to SHA cbc3c58e (autom8y-workflows PR #18: pin spectral-rulesets 1.22.2 — 1.22.3 crashed Spectral fleet-wide; includes PR #17 test_maxprocesses). Update when autom8y-workflows changes.
    uses: autom8y/autom8y-workflows/.github/workflows/satellite-ci-reusable.yml@cbc3c58e56f3e0adeaf57101c0400d8f5d7845ed
    with:
      mypy_targets: 'src/autom8_asana'
      coverage_package: 'autom8_asana'
      # coverage_threshold disabled: per-shard coverage is meaningless with
      # test_splits > 1 (each shard only covers ~25% of the package).
      # Aggregate coverage should be validated in a separate post-merge job.
      coverage_threshold: 0
      test_timeout: 40
      test_parallel: true
      # Cap xdist workers: -n auto (4 on the runner) under push-mode coverage
      # exhausts runner RAM and OOM-kills a worker on the asyncio-heavy
      # lambda_handler tests. 2 workers restores headroom. Pairs with the
      # workflow_handler test hardening in this PR (belt + suspenders).
      test_maxprocesses: 2
      test_splits: 4
      # worker_isolated excluded from the sharded gate: those tests SIGKILL an
      # xdist worker under CI resource pressure (the workflow_handler scar). They
      # run single-process in the non-blocking `workflow-handler-isolated` job below.
      test_markers_exclude: ${{ github.event_name == 'pull_request' && 'not integration and not benchmark and not slow and not fuzz and not worker_isolated' || 'not integration and not benchmark and not fuzz and not worker_isolated' }}
      run_integration: ${{ github.event_name == 'push' }}
      test_env: 'ASANA_WORKSPACE_GID=${{ vars.ASANA_WORKSPACE_GID }}'
      spectral_enabled: true
      openapi_spec_path: 'docs/api-reference/openapi.json'
      spec_check_enabled: true
      spec_check_validate_script: 'scripts/validate_openapi.py'
      spec_check_extras: '--all-extras'
      spec_check_env: |-
        AUTOM8Y_ENV=local
      semantic_score_enabled: true
      candidate_sdk_name: ${{ inputs.candidate_sdk_name }}
      candidate_sdk_version: ${{ inputs.candidate_sdk_version }}
      candidate_wheel_run_id: ${{ inputs.candidate_wheel_run_id }}
      dispatch_correlation_id: ${{ inputs.dispatch_correlation_id }}
      autom8y_workflows_sha: c88caabd8d9bba883e6a42628bdc2bba6d30512b
    secrets: inherit

  fuzz:
    name: Fuzz Tests (Hypothesis/Schemathesis)
    # Non-blocking: fuzz failures must not gate the consumer-gate workflow
    # conclusion. The fuzz suite is xfail(strict=False) and runs for signal
    # only — violations are tracked in the per-endpoint triage backlog.
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
      actions: read    # cross-workflow actions/download-artifact (consumer-gate from autom8y SDK-publish-v2.yml). Ports autom8y-ads PR #34 (commit 5080898 / merge 596db166) Path β remediation per AP-CANDIDATE-cross-fleet-consumer-gate-silent-bypass-survey N=2.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # zizmor artipacked mitigation: actions:read + cross-workflow
          # download-artifact + default checkout credential-persistence
          # combine into a credential-leak vector (artifacts may carry
          # the persisted git extraheader). Disabling persist-credentials
          # is the zizmor-recommended fix; this hardens the fuzz job
          # against credential-bleed into uploaded artifacts.
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        # Aligned with Lockfile Freshness + Idempotency Redis Contract jobs
        # which resolve via vars.AWS_ACCOUNT_ID + github-actions-deploy role.
        # Previous secrets.AWS_OIDC_ROLE_ARN resolution failed with
        # "Credentials could not be loaded" (10s fail-fast) because the
        # secret is not configured on this repo; fuzz job is non-blocking
        # (continue-on-error: true) but a real credential path lets the
        # Hypothesis suite actually execute and surface real signal.
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Login to CodeArtifact
        run: |
          CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token \
            --domain autom8y --domain-owner 696318035277 \
            --query authorizationToken --output text)
          export CODEARTIFACT_AUTH_TOKEN
          echo "UV_EXTRA_INDEX_URL=https://aws:${CODEARTIFACT_AUTH_TOKEN}@autom8y-696318035277.d.codeartifact.us-east-1.amazonaws.com/pypi/autom8y-python/simple/" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6
        with:
          enable-cache: true

      # G1-W05 WI-2 FIX-A (2026-05-16): cross-repo App-token mint.
      # secrets.GITHUB_TOKEN is satellite-scoped and cannot read
      # artifacts from autom8y/autom8y (the source workflow run repo).
      # Mirrors autom8y-workflows/satellite-ci-reusable.yml@L297-L305
      # canonical pattern. Without this, download-artifact emits 404
      # ("Not Found") — a permission-denied masquerading as missing
      # artifact, eliminating fuzz coverage attestation for asana.
      - name: Generate App token for cross-repo artifact download (consumer-gate)
        id: cross-repo-app-token
        if: inputs.candidate_wheel_run_id != ''
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: autom8y

      - name: Download candidate wheel (consumer-gate)
        if: inputs.candidate_wheel_run_id != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: candidate-wheel
          path: /tmp/candidate-wheel
          repository: autom8y/autom8y
          run-id: ${{ inputs.candidate_wheel_run_id }}
          github-token: ${{ steps.cross-repo-app-token.outputs.token }}

      - name: Verify candidate wheel present (consumer-gate fail-loud)
        if: inputs.candidate_wheel_run_id != ''
        run: |
          # Test-purpose-integrity guard: when consumer-gate dispatch passes
          # candidate_wheel_run_id, the candidate wheel MUST be present.
          # Silent-bypass would mean fuzz tests run against pyproject.toml-
          # resolved wheel instead of candidate. Per hygiene-sprint-3
          # 2026-05-05 cross-fleet port from autom8y-ads PR #34 (Path β
          # remediation; AP-CANDIDATE-cross-fleet-consumer-gate-silent-
          # bypass-survey N=2 mitigation). Preserves continue-on-error: true
          # at job-level for actual fuzz pytest failures only.
          if ! ls /tmp/candidate-wheel/*.whl >/dev/null 2>&1; then
            echo "::error::Consumer-gate test-purpose violation: candidate_wheel_run_id was set (${{ inputs.candidate_wheel_run_id }}) but no .whl file found at /tmp/candidate-wheel/. Cross-workflow actions/download-artifact likely failed; check fuzz job permissions and source workflow run-id validity."
            exit 1
          fi
          echo "Consumer-gate candidate wheel present at /tmp/candidate-wheel/:"
          ls -la /tmp/candidate-wheel/

      - name: Install candidate wheel (consumer-gate)
        if: inputs.candidate_wheel_run_id != ''
        run: uv pip install --system /tmp/candidate-wheel/*.whl

      - name: Install dependencies
        # --no-sources: ignore [tool.uv.sources] path overrides (which
        # reference monorepo-relative `../autom8y/sdks/python/...` paths
        # that don't resolve on a standalone runner checkout). Resolve
        # all autom8y-* packages from CodeArtifact instead. Mirrors the
        # Lockfile Freshness + Idempotency Redis Contract jobs.
        run: |
          uv pip install --system --no-sources '.[dev,api,auth,events]'
          uv pip install --system --no-sources --group dev

      - name: Run fuzz tests
        env:
          HYPOTHESIS_PROFILE: ci
          AUTOM8Y_ENV: test
          # PR-scope envelope: 5 examples on PRs, 25 on main/nightly.
          # Default in tests/test_openapi_fuzz.py:70 remains 25 (local dev).
          SCHEMATHESIS_MAX_EXAMPLES: ${{ github.event_name == 'pull_request' && '5' || '25' }}
        run: |
          python -m pytest tests/test_openapi_fuzz.py \
            -x -q --timeout=300 --no-header \
            -p no:xdist \
            2>&1 | tail -40

  workflow-handler-isolated:
    name: Workflow Handler (isolated, non-blocking)
    # QUARANTINE (PR #63): the workflow_handler tests invoke a handler that runs
    # asyncio.run internally; under CI resource pressure that SIGKILLs a pytest-
    # xdist worker ("node down"), intermittently failing the sharded gate. They
    # are excluded from the sharded run (worker_isolated marker) and executed
    # here SINGLE-PROCESS (-p no:xdist → no worker to crash) as a non-blocking
    # signal job. continue-on-error keeps a crash here from gating the merge
    # while preserving CI coverage of these tests. Remove the quarantine when the
    # production handler / test harness drops the nested-event-loop pattern.
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Login to CodeArtifact
        run: |
          CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token \
            --domain autom8y --domain-owner 696318035277 \
            --query authorizationToken --output text)
          export CODEARTIFACT_AUTH_TOKEN
          echo "UV_EXTRA_INDEX_URL=https://aws:${CODEARTIFACT_AUTH_TOKEN}@autom8y-696318035277.d.codeartifact.us-east-1.amazonaws.com/pypi/autom8y-python/simple/" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system --no-sources '.[dev,api,auth,events]'
          uv pip install --system --no-sources --group dev

      - name: Run workflow_handler tests (single-process, no xdist)
        env:
          AUTOM8Y_ENV: test
        run: |
          # -o addopts="" drops the repo-wide --dist=loadgroup (which requires
          # xdist); -p no:xdist runs in the main process so there is no worker
          # to SIGKILL. A crash here fails this non-blocking job only.
          python -m pytest tests/unit/lambda_handlers/test_workflow_handler.py \
            -p no:xdist -o addopts="" -v --no-header

  fleet-schema-governance:
    name: Fleet Schema Governance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: autom8y-api-schemas

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: autom8y/autom8y-api-schemas
          path: _autom8y-api-schemas
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Fleet schema governance (V1-subclass check)
        run: |
          set +e
          python _autom8y-api-schemas/src/autom8y_api_schemas/governance/check_response_meta.py \
            --json ./src/ > /tmp/governance.json
          exit_code=$?
          set -e
          {
            echo "## Fleet Schema Governance"
            echo '```json'
            cat /tmp/governance.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ $exit_code -ne 0 ]; then
            echo "::error::V1-subclassing hazard detected. See governance output."
            exit 1
          fi
