name: Test
run-name: "Test [${{ github.event.inputs.dispatch_correlation_id || github.sha }}]"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # sdk-contract-governance Sprint 3: accept dispatch from
  # autom8y/sdk-publish-v2.yml's consumer-gate job. See sibling satellites
  # for the rollout-window pin rationale.
  workflow_dispatch:
    inputs:
      candidate_sdk_name:
        description: 'Candidate SDK distribution name (consumer-gate)'
        type: string
        required: false
        default: ''
      candidate_sdk_version:
        description: 'Candidate SDK version (consumer-gate)'
        type: string
        required: false
        default: ''
      candidate_wheel_run_id:
        description: 'Run ID of the workflow that uploaded the candidate wheel artifact'
        type: string
        required: false
        default: ''
      dispatch_correlation_id:
        description: 'Correlation UUID echoed into the run name (consumer-gate)'
        type: string
        required: false
        default: ''

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    permissions:
      id-token: write
      contents: read
    # Pinned to SHA 0fb7b75373 (Path-A ADR-keyed exemption metadata, autom8y-workflows PR #8). Update when autom8y-workflows changes.
    uses: autom8y/autom8y-workflows/.github/workflows/satellite-ci-reusable.yml@c88caabd8d9bba883e6a42628bdc2bba6d30512b
    with:
      mypy_targets: 'src/autom8_asana'
      coverage_package: 'autom8_asana'
      # coverage_threshold disabled: per-shard coverage is meaningless with
      # test_splits > 1 (each shard only covers ~25% of the package).
      # Aggregate coverage should be validated in a separate post-merge job.
      coverage_threshold: 0
      test_timeout: 40
      test_parallel: true
      test_splits: 4
      test_markers_exclude: ${{ github.event_name == 'pull_request' && 'not integration and not benchmark and not slow and not fuzz' || 'not integration and not benchmark and not fuzz' }}
      run_integration: ${{ github.event_name == 'push' }}
      test_env: 'ASANA_WORKSPACE_GID=${{ vars.ASANA_WORKSPACE_GID }}'
      spectral_enabled: true
      openapi_spec_path: 'docs/api-reference/openapi.json'
      spec_check_enabled: true
      spec_check_validate_script: 'scripts/validate_openapi.py'
      spec_check_extras: '--all-extras'
      spec_check_env: |-
        AUTOM8Y_ENV=local
      semantic_score_enabled: true
      candidate_sdk_name: ${{ inputs.candidate_sdk_name }}
      candidate_sdk_version: ${{ inputs.candidate_sdk_version }}
      candidate_wheel_run_id: ${{ inputs.candidate_wheel_run_id }}
      dispatch_correlation_id: ${{ inputs.dispatch_correlation_id }}
      autom8y_workflows_sha: c88caabd8d9bba883e6a42628bdc2bba6d30512b
    secrets: inherit

  fuzz:
    name: Fuzz Tests (Hypothesis/Schemathesis)
    # Non-blocking: fuzz failures must not gate the consumer-gate workflow
    # conclusion. The fuzz suite is xfail(strict=False) and runs for signal
    # only — violations are tracked in the per-endpoint triage backlog.
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        # Aligned with Lockfile Freshness + Idempotency Redis Contract jobs
        # which resolve via vars.AWS_ACCOUNT_ID + github-actions-deploy role.
        # Previous secrets.AWS_OIDC_ROLE_ARN resolution failed with
        # "Credentials could not be loaded" (10s fail-fast) because the
        # secret is not configured on this repo; fuzz job is non-blocking
        # (continue-on-error: true) but a real credential path lets the
        # Hypothesis suite actually execute and surface real signal.
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Login to CodeArtifact
        run: |
          export CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token \
            --domain autom8y --domain-owner 696318035277 \
            --query authorizationToken --output text)
          echo "UV_EXTRA_INDEX_URL=https://aws:${CODEARTIFACT_AUTH_TOKEN}@autom8y-696318035277.d.codeartifact.us-east-1.amazonaws.com/pypi/autom8y-python/simple/" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6
        with:
          enable-cache: true

      - name: Download candidate wheel (consumer-gate)
        if: inputs.candidate_wheel_run_id != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: candidate-wheel
          path: /tmp/candidate-wheel
          run-id: ${{ inputs.candidate_wheel_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install candidate wheel (consumer-gate)
        if: inputs.candidate_wheel_run_id != ''
        run: uv pip install --system /tmp/candidate-wheel/*.whl

      - name: Install dependencies
        # --no-sources: ignore [tool.uv.sources] path overrides (which
        # reference monorepo-relative `../autom8y/sdks/python/...` paths
        # that don't resolve on a standalone runner checkout). Resolve
        # all autom8y-* packages from CodeArtifact instead. Mirrors the
        # Lockfile Freshness + Idempotency Redis Contract jobs.
        run: |
          uv pip install --system --no-sources '.[dev,api,auth,events]'
          uv pip install --system --no-sources --group dev

      - name: Run fuzz tests
        env:
          HYPOTHESIS_PROFILE: ci
          AUTOM8Y_ENV: test
          # PR-scope envelope: 5 examples on PRs, 25 on main/nightly.
          # Default in tests/test_openapi_fuzz.py:70 remains 25 (local dev).
          SCHEMATHESIS_MAX_EXAMPLES: ${{ github.event_name == 'pull_request' && '5' || '25' }}
        run: |
          python -m pytest tests/test_openapi_fuzz.py \
            -x -q --timeout=300 --no-header \
            -p no:xdist \
            2>&1 | tail -40

  fleet-schema-governance:
    name: Fleet Schema Governance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: autom8y-api-schemas

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: autom8y/autom8y-api-schemas
          path: _autom8y-api-schemas
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Fleet schema governance (V1-subclass check)
        run: |
          set +e
          python _autom8y-api-schemas/src/autom8y_api_schemas/governance/check_response_meta.py \
            --json ./src/ > /tmp/governance.json
          exit_code=$?
          set -e
          echo "## Fleet Schema Governance" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat /tmp/governance.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ $exit_code -ne 0 ]; then
            echo "::error::V1-subclassing hazard detected. See governance output."
            exit 1
          fi
