[project]
name = "autom8-asana"
version = "0.1.0"
description = "Async-first Asana API client extracted from autom8"
# readme = "README.md"  # Deferred to Phase 5
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "asana>=5.0.3",
    "polars>=0.20.0",
    "arrow>=1.3.0",
]

[project.optional-dependencies]
redis = [
    "redis>=5.0.0",
    "hiredis>=2.0.0",  # C parser for performance (optional)
]
aws = [
    "boto3>=1.34.0",  # AWS SDK for Secrets Manager (ADR-VAULT-001)
]
api = [
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "slowapi>=0.1.9",
    "structlog>=24.1.0",
]
s2s = [
    # S2S auth requires autom8y-auth SDK (TDD-S2S-001)
    # Installed from CodeArtifact via UV_EXTRA_INDEX_URL in Docker build
    "autom8y-auth>=0.1.0",
    "python-jose[cryptography]>=3.3.0",  # For JWT parsing fallback
]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.0.0",
    "pytest-timeout>=2.2.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
    "respx>=0.20.0",  # httpx mocking
    "fakeredis>=2.20.0",  # Redis mocking for tests
    "moto>=5.0.0",  # AWS/S3 mocking for tests
    "boto3>=1.34.0",  # AWS SDK (required for moto)
    "boto3-stubs[secretsmanager]>=1.34.0",  # Type stubs for boto3
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autom8_asana"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
timeout = 60
timeout_method = "thread"
markers = [
    "integration: marks tests as integration tests requiring live API access",
]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_ignores = true

[tool.ruff]
line-length = 88
target-version = "py310"

