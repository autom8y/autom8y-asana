# .a8/autom8y/org-secrets.conf
# SSM_RELATIVE_PATH:ENV_VAR_NAME
#
# SSM full path = ${_A8_SSM_PREFIX}/platform/<SSM_RELATIVE_PATH>
# Values fetched from SSM at direnv load time (with 24h local cache).
# secrets.shared provides the offline fallback for these same values.

# Grafana
grafana/auth-token:GRAFANA_AUTH

# Cloudflare
cloudflare/api-token:CLOUDFLARE_API_TOKEN

# Slack
slack/alerts-bot-token:OBSERVABILITY_SLACK_BOT_TOKEN
slack/automation-bot-token:SLACK_BOT_TOKEN

# Grafana Loki
grafana/loki-api-key:GRAFANA_LOKI_API_KEY

# Grafana Tempo
grafana/tempo-api-key:GRAFANA_TEMPO_API_KEY
grafana/tempo-api-key-write:GRAFANA_TEMPO_API_KEY_WRITE
