# .a8/autom8y/org-secrets.conf
# SSM_RELATIVE_PATH:ENV_VAR_NAME
#
# SSM full path = ${_A8_SSM_PREFIX}/platform/<SSM_RELATIVE_PATH>
# Values fetched from SSM at direnv load time (with 24h local cache).
# secrets.shared provides the offline fallback for these same values.

# Grafana
grafana/auth-token:AUTOM8Y_GRAFANA_AUTH

# Cloudflare
cloudflare/api-token:AUTOM8Y_CLOUDFLARE_API_TOKEN

# Slack
slack/alerts-bot-token:AUTOM8Y_OBSERVABILITY_SLACK_BOT_TOKEN
slack/automation-bot-token:AUTOM8Y_SLACK_BOT_TOKEN

# Grafana Loki
grafana/loki-api-key:AUTOM8Y_GRAFANA_LOKI_API_KEY

# Grafana Tempo
grafana/tempo-api-key:AUTOM8Y_GRAFANA_TEMPO_API_KEY
grafana/tempo-api-key-write:AUTOM8Y_GRAFANA_TEMPO_API_KEY_WRITE

# Service API Key (S2S JWT auth)
auth/service-api-key:SERVICE_API_KEY
