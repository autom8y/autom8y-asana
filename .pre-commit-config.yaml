# Pre-commit hooks for autom8y-asana
# Versions pinned to match monorepo (autom8y/.pre-commit-config.yaml)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        name: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # Semgrep (architecture enforcement)
  - repo: local
    hooks:
      - id: semgrep
        name: semgrep
        entry: semgrep --config .semgrep.yml --error --disable-version-check
        language: system
        types: [python]
        pass_filenames: false

  # Type checking (mypy strict)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/autom8_asana --ignore-missing-imports --strict
        language: system
        types: [python]
        pass_filenames: false

  # Gitleaks (secrets scanning at commit time)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # Hadolint (Dockerfile linting) — config: .hadolint.yaml (ADR-013)
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        name: hadolint
        entry: hadolint
        language: docker_image
        types: [dockerfile]
        args: [--config, .hadolint.yaml, --failure-threshold, warning]
